<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#0d1117;color:white}
.container{max-width:1100px;margin:auto;padding:20px}
.card{background:#161b22;border:1px solid #30363d;border-radius:14px;padding:20px;margin-bottom:20px}
.title{font-size:24px;font-weight:bold}
.topbar{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.label{margin-top:15px;margin-bottom:6px;color:#8b949e;font-size:14px}
input,textarea,select{width:100%;padding:13px;border-radius:10px;border:1px solid #30363d;background:#0d1117;color:white;font-size:15px}
textarea{resize:vertical}
input:focus,textarea:focus,select:focus{outline:none;border-color:#58a6ff}
button{border:none;border-radius:10px;padding:12px 18px;font-weight:bold;cursor:pointer}
.btn{width:100%;background:#238636;color:white;margin-top:20px}
.btn:disabled{opacity:.6;cursor:not-allowed}
.logout{background:#e94560;color:white}
.photos{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px}
.photos img{width:90px;height:90px;object-fit:cover;border-radius:10px;border:1px solid #30363d;cursor:pointer;transition:.2s}
.photos img:hover{transform:scale(1.05)}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:12px 22px;border-radius:30px;color:white;font-weight:bold;z-index:9999;max-width:90%;text-align:center}
.report{background:#0d1117;border:1px solid #30363d;padding:15px;border-radius:10px;margin-top:15px}
.footer{text-align:center;padding:20px;margin-top:30px;border-top:1px solid #30363d;color:#8b949e;font-size:13px}
.ownerTabs{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.tabBtn{padding:12px 18px;background:#161b22;border:1px solid #30363d;color:white;border-radius:10px;font-weight:bold;cursor:pointer}
.activeTab{background:#238636}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.resultBox{background:#0d1117;border:1px solid #30363d;border-radius:12px;padding:15px;margin-top:15px;line-height:1.9}
.notifyCard{background:#0d1117;border:1px solid #30363d;border-left:5px solid #e3b341;border-radius:12px;padding:15px;margin-top:12px}
.notifyDue{border-left-color:#e94560}
.notifyOk{border-left-color:#3fb950}
#imageModal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.95);justify-content:center;align-items:center;z-index:99999;padding:20px}
#imageModal img{max-width:95%;max-height:95%;border-radius:14px}
#closeModal{position:absolute;top:20px;right:25px;font-size:35px;cursor:pointer;color:white}
@media(max-width:600px){.topbar{flex-direction:column;align-items:flex-start}.grid2{grid-template-columns:1fr}}
</style>

    `).join('')}

    `).join('')}
  `;

function toast(msg,color='#238636'){
  document.querySelectorAll('.toast').forEach(e=>e.remove());
  const t=document.createElement('div');
  t.className='toast';
  t.style.background=color;
  t.innerText=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),3000);
}

function addYears(dateStr, years){
  const d = new Date(dateStr);
  d.setFullYear(d.getFullYear() + Number(years || 0));
  return d.toISOString().split('T')[0];
}

function daysLeft(dateStr){
  const todayDate = new Date(today());
  const target = new Date(dateStr);
  const diff = target - todayDate;
  return Math.ceil(diff / (1000 * 60 * 60 * 24));
}

function saveFutureFunds(){
  localStorage.setItem('civil_future_funds', JSON.stringify(futureFunds));
}

function sortReports(list){
  return (list || []).sort((a,b)=>{
    const dateA = new Date(a.date || a.created_at || 0);
    const dateB = new Date(b.date || b.created_at || 0);
    if(dateB - dateA !== 0) return dateB - dateA;
    return new Date(b.created_at || 0) - new Date(a.created_at || 0);
  });
}

function login(){
  const u=document.getElementById('username').value.trim();
  const p=document.getElementById('password').value.trim();
  const match=USERS[u];

  if(match && match.pass===p){
    user={username:u,role:match.role,name:match.name};
    localStorage.setItem('civil_user',JSON.stringify(user));
    renderDashboard();
    loadReports(true);

  if(realtimeChannel){
    db.removeChannel(realtimeChannel);
    realtimeChannel=null;
  }

  localStorage.removeItem('civil_user');
  user=null;
  loginPage();
}

async function loadReports(refreshUI=false){
  const {data,error}=await db
  .from('reports')
  .select('id,created_at,date,site_name,project_name,supervisor_name,progress,expenses,photos,state,district')
  .order('date',{ascending:false})
  .order('created_at',{ascending:false})
  .limit(200);

  if(error){
    toast('Load Error: '+error.message,'#e94560');
    return;
  }

  reports = sortReports(data || []);
  saveCache();

  if(refreshUI){
    renderDashboard();
  }
}

function startRealtime(){
  if(realtimeChannel)return;

  realtimeChannel = db.channel('reports-live')
  .on(
    'postgres_changes',
    {event:'*',schema:'public',table:'reports'},
    async ()=>{
      await loadReports(true);
    }
  )
  .subscribe();
}

function compressImage(file){
  return new Promise((resolve)=>{
    const reader=new FileReader();

    reader.onload=function(e){
      const img=new Image();

      img.onload=function(){
        const canvas=document.createElement('canvas');

        let width=img.width;
        let height=img.height;
        const maxSize=750;

        if(width>height && width>maxSize){
          height=Math.round(height*maxSize/width);
          width=maxSize;
        }else if(height>maxSize){
          width=Math.round(width*maxSize/height);
          height=maxSize;
        }

        canvas.width=width;
        canvas.height=height;

        const ctx=canvas.getContext('2d');
        ctx.drawImage(img,0,0,width,height);

        const compressedUrl=canvas.toDataURL('image/jpeg',0.55);

        resolve({
          name:file.name,
          url:compressedUrl
        });
      };

      img.src=e.target.result;
    };

    reader.readAsDataURL(file);
  });
}

async function handlePhotos(input){
  const files=Array.from(input.files);

  if(files.length===0)return;

  if(files.length>4){
    toast('Ek baar me maximum 4 photos upload karo','#e3b341');
    return;
  }

  toast('Photos processing...', '#58a6ff');

  const images=await Promise.all(files.map(file=>compressImage(file)));

  uploadedPhotos=[...uploadedPhotos,...images].slice(0,6);

  renderPreview();

  toast('Photos added');
}

function renderPreview(){
  const box=document.getElementById('preview');
  if(!box)return;

  box.innerHTML=uploadedPhotos.map((p,i)=>`
    <div style="position:relative;">
      <img src="${p.url}" onclick="openImageModal('${p.url}')">
      <button onclick="removePhoto(${i})"
        style="position:absolute;top:-8px;right:-8px;background:#e94560;color:white;border-radius:50%;padding:3px 7px;font-size:11px;">
        ×
      </button>
    </div>
  `).join('');
}

function removePhoto(index){
  uploadedPhotos.splice(index,1);
  renderPreview();
}

function openImageModal(src){
  document.getElementById('modalImage').src=src;
  document.getElementById('imageModal').style.display='flex';
}

function closeImageModal(){
  document.getElementById('imageModal').style.display='none';
}

async function saveReport(){
  if(isSaving)return;

  const date=document.getElementById('date').value.trim();
  const state=document.getElementById('state').value.trim();
  const district=document.getElementById('district').value.trim();
  const site=document.getElementById('site').value.trim();
  const project=document.getElementById('project').value.trim();
  const progress=document.getElementById('progress').value.trim();
  const expenseItem=document.getElementById('expenseItem').value.trim();
  const expenseAmount=document.getElementById('expenseAmount').value.trim();

  if(!date || !state || !district || !site || !project || !progress){
    toast('Date, State, District, Site, Project aur Progress zaroori hai','#e3b341');
    return;
  }

  isSaving=true;

  const btn=document.getElementById('saveBtn');
  if(btn){
    btn.disabled=true;
    btn.innerText='Saving...';
  }

  const payload={
    date,
    state,
    district,
    site_name:site,
    project_name:project,
    supervisor_name:user.name,
    progress,
    expenses:[{
      item:expenseItem || '',
      amount:expenseAmount || '0'
    }],
    photos:uploadedPhotos || []
  };

  const {data,error}=await db
  .from('reports')
  .insert([payload])
  .select()
  .single();

  isSaving=false;

  if(btn){
    btn.disabled=false;
    btn.innerText='Save Report';
  }

  if(error){
    toast('Save Failed: '+error.message,'#e94560');
    return;
  }

  if(data){
    reports = sortReports([data,...reports]);
    saveCache();
  }

  toast('Report Saved Successfully');

  uploadedPhotos=[];

  renderDashboard();

  loadReports(false);
}

function showOwnerTab(id,btn){
  activeOwnerTab = id;

  document.querySelectorAll('.ownerTab').forEach(tab=>{
    tab.style.display='none';
  });

  document.querySelectorAll('.tabBtn').forEach(b=>{
    b.classList.remove('activeTab');
  });

  document.getElementById(id).style.display='block';
  btn.classList.add('activeTab');
}

function calculateTender(){
  const tenderAmount = Number(document.getElementById('tenderAmount')?.value || 0);
  const rateType = document.getElementById('rateType')?.value || 'below';
  const ratePercent = Number(document.getElementById('ratePercent')?.value || 0);

  const sdpg = Number(document.getElementById('sdpg')?.value || 0);
  const gst = Number(document.getElementById('gst')?.value || 0);
  const royalty = Number(document.getElementById('royalty')?.value || 0);
  const labourCess = Number(document.getElementById('labourCess')?.value || 0);
  const otherDeduction = Number(document.getElementById('otherDeduction')?.value || 0);

  let quotedAmount = tenderAmount;

  if(rateType === 'below'){
    quotedAmount = tenderAmount - (tenderAmount * ratePercent / 100);
  }

  if(rateType === 'above'){
    quotedAmount = tenderAmount + (tenderAmount * ratePercent / 100);
  }

  const sdpgAmt = quotedAmount * sdpg / 100;
  const gstAmt = quotedAmount * gst / 100;
  const royaltyAmt = quotedAmount * royalty / 100;
  const labourCessAmt = quotedAmount * labourCess / 100;
  const otherAmt = quotedAmount * otherDeduction / 100;

  const totalDeduction = sdpgAmt + gstAmt + royaltyAmt + labourCessAmt + otherAmt;
  const netAmount = quotedAmount - totalDeduction;

  const result = document.getElementById('tenderResult');

  if(!result)return;

  result.innerHTML = `
    <div><b>Tender Amount:</b> ${money(tenderAmount)}</div>
    <div><b>${rateType === 'below' ? 'Below' : 'Above'} ${ratePercent}% ke baad Amount:</b> ${money(quotedAmount)}</div>
    <hr style="border:0;border-top:1px solid #30363d;margin:10px 0;">
    <div>SD/PG Deduction: ${money(sdpgAmt)}</div>
    <div>GST Deduction: ${money(gstAmt)}</div>
    <div>Royalty Deduction: ${money(royaltyAmt)}</div>
    <div>Labour Cess Deduction: ${money(labourCessAmt)}</div>
    <div>Other/Office Deduction: ${money(otherAmt)}</div>
    <hr style="border:0;border-top:1px solid #30363d;margin:10px 0;">
    <div style="font-size:18px;color:#e3b341;"><b>Total Deduction:</b> ${money(totalDeduction)}</div>
    <div style="font-size:24px;color:#3fb950;margin-top:6px;"><b>Net Amount:</b> ${money(netAmount)}</div>
  `;
}

function addFutureFund(){
  const department = document.getElementById('fundDepartment').value.trim();
  const agreementDate = document.getElementById('agreementDate').value;
  const sdpgAmount = Number(document.getElementById('fundAmount').value || 0);
  const releaseYears = Number(document.getElementById('releaseYears').value || 3);
  const projectName = document.getElementById('fundProject').value.trim();
  const note = document.getElementById('fundNote').value.trim();

  if(!department || !agreementDate || !sdpgAmount){
    toast('Department, agreement date aur SD/PG amount bharna zaroori hai','#e3b341');
    return;
  }

  const releaseDate = addYears(agreementDate, releaseYears);

  futureFunds.unshift({
    id: Date.now(),
    department,
    projectName,
    agreementDate,
    sdpgAmount,
    releaseYears,
    releaseDate,
    note,
    createdAt: today()
  });

  saveFutureFunds();
  toast('SD/PG release reminder added');
  renderDashboard();
}

function deleteFutureFund(id){
  futureFunds = futureFunds.filter(f=>f.id !== id);
  saveFutureFunds();
  toast('Reminder deleted','#e94560');
  renderDashboard();
}

function renderFutureFunds(){
  const totalFuture = futureFunds.reduce((s,f)=>s + Number(f.sdpgAmount || 0),0);

  return `
  <div class="card">
    <div style="font-size:24px;font-weight:bold;margin-bottom:15px;">💰 Future Funds / SD-PG Release Calendar</div>

    <div class="grid2">
      <div>
        <div class="label">Department Name *</div>
        <input id="fundDepartment" placeholder="PWD / PMGSY / WRD / Nagar Nigam">
      </div>

      <div>
        <div class="label">Project / Tender Name</div>
        <input id="fundProject" placeholder="Project name">
      </div>

      <div>
        <div class="label">Agreement Date *</div>
        <input type="date" id="agreementDate" value="${today()}">
      </div>

      <div>
        <div class="label">SD/PG Deposit Amount *</div>
        <input type="number" id="fundAmount" placeholder="Example: 250000">
      </div>

      <div>
        <div class="label">Release After Years</div>
        <select id="releaseYears">
          <option value="1">1 Year</option>
          <option value="2">2 Years</option>
          <option value="3" selected>3 Years</option>
          <option value="4">4 Years</option>
          <option value="5">5 Years</option>
        </select>
      </div>

      <div>
        <div class="label">Note</div>
        <input id="fundNote" placeholder="FDR / BG / SD / PG details">
      </div>
    </div>

    <button class="btn" onclick="addFutureFund()">Add Release Reminder</button>

    <div class="resultBox">
      <div style="font-size:15px;color:#8b949e;">Total Future Receivable SD/PG</div>
      <div style="font-size:36px;font-weight:bold;color:#3fb950;">${money(totalFuture)}</div>
    </div>
  </div>

  <div class="card">
    <div style="font-size:22px;font-weight:bold;margin-bottom:12px;">🔔 Upcoming Release Notifications</div>

    ${
      futureFunds.length === 0
      ? `<div style="color:#8b949e;">Abhi koi SD/PG reminder add nahi hai.</div>`
      : futureFunds
        .slice()
        .sort((a,b)=>new Date(a.releaseDate)-new Date(b.releaseDate))
        .map(f=>{
          const left = daysLeft(f.releaseDate);
          let status = '';
          let cls = 'notifyCard';

          if(left < 0){
            status = `⚠️ Release date over ho chuki hai (${Math.abs(left)} days ago)`;
            cls += ' notifyDue';
          }else if(left <= 30){
            status = `🔔 Release near hai — ${left} days left`;
            cls += ' notifyDue';
          }else{
            status = `✅ Upcoming — ${left} days left`;
            cls += ' notifyOk';
          }

          return `
          <div class="${cls}">
            <div style="display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;">
              <div>
                <div style="font-size:18px;font-weight:bold;color:#58a6ff;">${f.department}</div>
                <div style="margin-top:4px;color:#8b949e;">${f.projectName || 'No project name'}</div>
              </div>

              <button onclick="deleteFutureFund(${f.id})" style="background:#e94560;color:white;padding:8px 12px;">Delete</button>
            </div>

            <div style="margin-top:12px;line-height:1.8;">
              Agreement Date: <b>${f.agreementDate}</b><br>
              Release After: <b>${f.releaseYears} Years</b><br>
              Auto Release Date: <b style="color:#e3b341;">${f.releaseDate}</b><br>
              SD/PG Amount: <b style="color:#3fb950;">${money(f.sdpgAmount)}</b><br>
              Notification: <b>${status}</b>
              ${f.note ? `<br>Note: ${f.note}` : ''}
            </div>
          </div>
          `;
        }).join('')
    }
  </div>
  `;
}

function getFilteredReports(){
  return reports.filter(r=>{
    const stateOk = ownerStateFilter ? (r.state === ownerStateFilter) : true;
    const districtOk = ownerDistrictFilter ? (r.district === ownerDistrictFilter) : true;
    return stateOk && districtOk;
  });
}

function renderReportsList(list){
  if(list.length===0){
    return `<div style="color:#8b949e;">No Reports Found</div>`;
  }

  return list.map(r=>`
    <div class="report">
      <div style="font-size:20px;font-weight:bold;color:#58a6ff;">${r.project_name || ''}</div>
      <div style="margin-top:5px;color:#8b949e;">🏗️ ${r.site_name || ''}</div>
      <div style="margin-top:5px;color:#8b949e;">📍 ${r.state || 'State not set'} / ${r.district || 'District not set'}</div>
      <div style="margin-top:12px;line-height:1.8;">${r.progress || ''}</div>

      <div style="margin-top:12px;font-size:13px;color:#8b949e;line-height:1.8;">
        📅 ${r.date || ''}<br>
        👷 ${r.supervisor_name || ''}
      </div>

      ${
        r.photos && r.photos.length>0
        ? `<div class="photos">
            ${r.photos.map(p=>`
              <img loading="lazy" src="${p.url}" onclick="openImageModal('${p.url}')">
            `).join('')}
           </div>`
        : ''
      }
    </div>
  `).join('');
}

  const filtered = getFilteredReports();

  return `
  <div class="card">
    <div style="font-size:20px;font-weight:bold;margin-bottom:12px;">🔎 Filter by State / District</div>

    <div class="grid2">
      <div>
        <div class="label">State</div>

          ${Object.keys(STATE_DISTRICTS).map(s=>`
            <option value="${s}" ${ownerStateFilter===s?'selected':''}>${s}</option>

        <select id="ownerDistrictFilter" onchange="updateOwnerFilter()">
          <option value="">All Districts</option>
          ${(STATE_DISTRICTS[ownerStateFilter] || []).map(d=>`

}
