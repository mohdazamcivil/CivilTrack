<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CivilTrack Pro</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0d1117;
color:white;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.card{
background:#161b22;
border:1px solid #30363d;
border-radius:14px;
padding:20px;
margin-bottom:20px;
}

.title{
font-size:24px;
font-weight:bold;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
gap:10px;
}

.label{
margin-top:15px;
margin-bottom:5px;
color:#8b949e;
font-size:14px;
}

input,
textarea{
width:100%;
padding:13px;
border-radius:10px;
border:1px solid #30363d;
background:#0d1117;
color:white;
font-size:15px;
}

input:focus,
textarea:focus{
outline:none;
border-color:#58a6ff;
}

textarea{
resize:vertical;
}

button{
border:none;
border-radius:10px;
padding:12px 18px;
font-weight:bold;
cursor:pointer;
}

.btn{
width:100%;
background:#238636;
color:white;
margin-top:18px;
}

.logout{
background:#e94560;
color:white;
}

.report{
background:#0d1117;
border:1px solid #30363d;
border-radius:10px;
padding:15px;
margin-top:14px;
}

.photos{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:12px;
}

.photos img{
width:90px;
height:90px;
object-fit:cover;
border-radius:10px;
border:1px solid #30363d;
cursor:pointer;
transition:0.2s;
}

.photos img:hover{
transform:scale(1.05);
}

.toast{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:#238636;
color:white;
padding:12px 20px;
border-radius:30px;
z-index:9999;
}

.footer{
width:100%;
text-align:center;
margin-top:30px;
padding:18px 10px;
color:#8b949e;
font-size:13px;
border-top:1px solid #30363d;
}

.ownerTabs{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

.tabBtn{
padding:12px 18px;
background:#161b22;
color:white;
border:1px solid #30363d;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.activeTab{
background:#238636;
}

#imageModal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
z-index:99999;
justify-content:center;
align-items:center;
padding:20px;
}

#imageModal img{
max-width:95%;
max-height:95%;
border-radius:14px;
object-fit:contain;
}

#closeModal{
position:absolute;
top:20px;
right:25px;
color:white;
font-size:35px;
font-weight:bold;
cursor:pointer;
}

@media(max-width:600px){

.topbar{
flex-direction:column;
align-items:flex-start;
}

}

</style>

</head>

<body>

<div id="app"></div>

<div id="imageModal">

<span
id="closeModal"
onclick="closeImageModal()"
>
✕
</span>

<img id="modalImage">

</div>

<script>

/* =========================
SUPABASE FIXED
========================= */

const SUPABASE_URL =
'https://wbqikvaixrlgaaresldq.supabase.co';

const SUPABASE_KEY =
'PASTE_YOUR_REAL_ANON_KEY_HERE';

/*
IMPORTANT:

Yahan apna original anon key paste karo.

Example:
eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9....

*/

const { createClient } = supabase;

const db = createClient(
SUPABASE_URL,
SUPABASE_KEY
);

/* =========================
USERS
========================= */

const USERS = {

owner:{
pass:'owner123',
role:'owner',
name:'Site Owner'
},

engineer1:{
pass:'eng123',
role:'engineer',
name:'MOHD AZAM'
},

supervisor1:{
pass:'sup123',
role:'engineer',
name:'Rajesh Kumar'
}

};

/* =========================
GLOBALS
========================= */

let user = JSON.parse(
localStorage.getItem('civil_user')
|| 'null'
);

let reports = [];

let uploadedPhotos = [];

/* =========================
TOAST
========================= */

function toast(msg,color='#238636'){

document
.querySelectorAll('.toast')
.forEach(e=>e.remove());

const t =
document.createElement('div');

t.className='toast';

t.style.background=color;

t.innerText=msg;

document.body.appendChild(t);

setTimeout(()=>{
t.remove();
},3000);

}

/* =========================
LOGIN PAGE
========================= */

function loginPage(){

document.getElementById('app')
.innerHTML = `

<div class="container">

<div
class="card"
style="
max-width:420px;
margin:80px auto;
">

<div
class="title"
style="
text-align:center;
margin-bottom:25px;
">

🏗️ CivilTrack Pro

</div>

<div class="label">
Username
</div>

<input
id="username"
placeholder="Enter username"
>

<div class="label">
Password
</div>

<input
type="password"
id="password"
placeholder="Enter password"
>

<button
class="btn"
onclick="login()">

Login

</button>

<div
style="
margin-top:20px;
color:#8b949e;
font-size:13px;
line-height:1.8;
">

Owner:
owner / owner123

<br>

Engineer:
engineer1 / eng123

</div>

<div class="footer">
© Copyright Reserved | Made by <b>MOHD AZAM</b>
</div>

</div>

</div>
`;
}

/* =========================
LOGIN
========================= */

function login(){

const u =
document.getElementById('username')
.value.trim();

const p =
document.getElementById('password')
.value.trim();

const match = USERS[u];

if(
match &&
match.pass === p
){

user = {
username:u,
role:match.role,
name:match.name
};

localStorage.setItem(
'civil_user',
JSON.stringify(user)
);

dashboard();

}else{

toast(
'Invalid Login',
'#e94560'
);

}

}

/* =========================
LOGOUT
========================= */

function logout(){

localStorage.removeItem(
'civil_user'
);

user = null;

loginPage();

}

/* =========================
LOAD REPORTS
========================= */

async function loadReports(){

const {
data,
error
} = await db
.from('reports')
.select('*')
.order(
'created_at',
{ascending:false}
);

if(error){

toast(
error.message,
'#e94560'
);

return;
}

reports = data || [];

}

/* =========================
PHOTO UPLOAD
========================= */

function handlePhotos(input){

const files =
Array.from(input.files);

Promise.all(

files.map(file=>{

return new Promise(resolve=>{

const reader =
new FileReader();

reader.onload = e => {

resolve({
name:file.name,
url:e.target.result
});

};

reader.readAsDataURL(file);

});

})

).then(images=>{

uploadedPhotos = [
...uploadedPhotos,
...images
];

renderPreview();

});

}

function renderPreview(){

const box =
document.getElementById('preview');

if(!box) return;

box.innerHTML = uploadedPhotos
.map(p=>`
<img src="${p.url}">
`)
.join('');

}

/* =========================
IMAGE FULL VIEW
========================= */

function openImageModal(src){

document.getElementById(
'modalImage'
).src = src;

document.getElementById(
'imageModal'
).style.display = 'flex';

}

function closeImageModal(){

document.getElementById(
'imageModal'
).style.display = 'none';

}

/* =========================
OWNER TAB SWITCH
========================= */

function showOwnerTab(id,btn){

document
.querySelectorAll('.ownerTabContent')
.forEach(tab=>{
tab.style.display='none';
});

document
.querySelectorAll('.tabBtn')
.forEach(b=>{
b.classList.remove('activeTab');
});

document.getElementById(id)
.style.display='block';

btn.classList.add('activeTab');

}

/* =========================
SAVE REPORT FIXED
========================= */

async function saveReport(){

const date =
document.getElementById('date')
.value;

const site =
document.getElementById('site')
.value;

const project =
document.getElementById('project')
.value;

const progress =
document.getElementById('progress')
.value;

const expenseItem =
document.getElementById('expenseItem')
.value;

const expenseAmount =
document.getElementById('expenseAmount')
.value;

if(
!date ||
!site ||
!project ||
!progress
){

toast(
'Please fill all required fields',
'#e3b341'
);

return;
}

const payload = {

date:date,

site_name:site,

project_name:project,

supervisor_name:user.name,

progress:progress,

expenses:[
{
item:expenseItem,
amount:expenseAmount
}
],

photos:uploadedPhotos

};

const { error } =
await db
.from('reports')
.insert([payload]);

if(error){

toast(
'Save Failed : ' + error.message,
'#e94560'
);

return;
}

toast(
'Report Saved Successfully'
);

uploadedPhotos = [];

dashboard();

}

/* =========================
DASHBOARD
========================= */

async function dashboard(){

await loadReports();

let filteredReports = reports;

if(user.role !== 'owner'){

filteredReports =
reports.filter(r=>
r.supervisor_name === user.name
);

}

document.getElementById('app')
.innerHTML = `

<div class="container">

<div class="topbar">

<div class="title">
🏗️ CivilTrack Pro
</div>

<div
style="
display:flex;
align-items:center;
gap:10px;
">

<div>

${
user.role === 'owner'
? '👑 Owner'
: '👷 Engineer'
}

:
${user.name}

</div>

<button
class="logout"
onclick="logout()">

Logout

</button>

</div>

</div>

${
user.role !== 'owner'

?

`

<div class="card">

<div
style="
font-size:20px;
font-weight:bold;
margin-bottom:18px;
">

➕ Add Site Report

</div>

<div class="label">
Date *
</div>

<input type="date" id="date">

<div class="label">
Site Name *
</div>

<input
id="site"
placeholder="Enter site name"
>

<div class="label">
Project Name *
</div>

<input
id="project"
placeholder="Enter project name"
>

<div class="label">
Today's Progress *
</div>

<textarea
id="progress"
rows="4"
placeholder="Write today progress">
</textarea>

<div class="label">
Expense Item
</div>

<input
id="expenseItem"
placeholder="Cement / Sand etc"
>

<div class="label">
Expense Amount
</div>

<input
type="number"
id="expenseAmount"
placeholder="Enter amount"
>

<div class="label">
Upload Site Photos
</div>

<input
type="file"
multiple
accept="image/*"
onchange="handlePhotos(this)"
>

<div
class="photos"
id="preview">
</div>

<button
class="btn"
onclick="saveReport()">

Save Report

</button>

</div>

`

:

`

<div class="ownerTabs">

<button
class="tabBtn activeTab"
onclick="showOwnerTab('progressTab',this)"
>
📈 Site Progress
</button>

<button
class="tabBtn"
onclick="showOwnerTab('fundTab',this)"
>
💰 Future Funds
</button>

</div>

<!-- SITE PROGRESS -->

<div
id="progressTab"
class="ownerTabContent"
>

<div class="card">

<div
style="
font-size:22px;
font-weight:bold;
margin-bottom:18px;
">

📈 Site Progress

</div>

${
reports.length === 0

?

`
<div style="color:#8b949e;">
No Site Reports Found
</div>
`

:

reports.map(r=>`

<div class="report">

<div
style="
font-size:20px;
font-weight:bold;
color:#58a6ff;
">

${r.project_name}

</div>

<div
style="
margin-top:5px;
color:#8b949e;
">

🏗️ ${r.site_name}

</div>

<div
style="
margin-top:15px;
line-height:1.8;
font-size:15px;
">

${r.progress}

</div>

<div
style="
margin-top:12px;
font-size:13px;
color:#8b949e;
line-height:1.8;
">

📅 ${r.date}

<br>

👷 ${r.supervisor_name}

</div>

${
r.photos &&
r.photos.length > 0

?

`

<div class="photos">

${r.photos.map(p=>`

<img
src="${p.url}"
onclick="openImageModal('${p.url}')"
>

`).join('')}

</div>

`

:

''
}

</div>

`).join('')
}

</div>

</div>

<!-- FUNDS -->

<div
id="fundTab"
class="ownerTabContent"
style="display:none;"
>

<div class="card">

<div
style="
font-size:22px;
font-weight:bold;
margin-bottom:18px;
">

💰 Future Funds

</div>

<div
style="
font-size:34px;
font-weight:bold;
color:#3fb950;
">

₹ ${
reports.reduce((sum,r)=>{

return sum +
(
Number(
r.expenses?.[0]?.amount
) || 0
);

},0).toLocaleString()
}

</div>

</div>

</div>

`
}

<div class="footer">
© Copyright Reserved | Made by <b>MOHD AZAM</b>
</div>

</div>

`;

}

/* =========================
ESC CLOSE IMAGE
========================= */

document.addEventListener(
'keydown',
function(e){

if(e.key === 'Escape'){
closeImageModal();
}

}
);

/* =========================
START
========================= */

if(user){
dashboard();
}else{
loginPage();
}

</script>

</body>
</html>
