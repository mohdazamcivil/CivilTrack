<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CivilTrack Pro</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#0d1117;
  color:#fff;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.card{
  background:#161b22;
  border:1px solid #30363d;
  border-radius:14px;
  padding:18px;
  margin-bottom:15px;
}

input,textarea{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  margin-top:6px;
  background:#0d1117;
  color:#fff;
  border:1px solid #30363d;
}

button{
  border:none;
  padding:12px 18px;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.btn{
  background:#238636;
  color:white;
  width:100%;
  margin-top:15px;
}

.logout{
  background:#e94560;
  color:white;
}

.report{
  margin-top:12px;
  padding:14px;
  border-radius:10px;
  background:#0d1117;
  border:1px solid #30363d;
}

.title{
  font-size:24px;
  font-weight:bold;
  margin-bottom:20px;
  text-align:center;
}

.label{
  margin-top:14px;
  margin-bottom:5px;
  font-size:14px;
  color:#8b949e;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.toast{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:#238636;
  color:white;
  padding:12px 20px;
  border-radius:30px;
  z-index:999;
}
</style>
</head>

<body>

<div id="app"></div>

<script>

/* =========================
   SUPABASE CONFIG
========================= */

const SUPABASE_URL =
'https://wbqikvaixrlgaaresldq.supabase.co';

const SUPABASE_KEY =
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndicWlrdmFpeHJsZ2FhcmVzbGRxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5OTYwNjUsImV4cCI6MjA5NDU3MjA2NX0.Oq_qLGPEWv7SnpCtZ0eSDfYzZwiYeuYI64hjcz6Moqg';

const { createClient } = supabase;

const db = createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

/* =========================
   USERS
========================= */

const USERS = {

  owner:{
    pass:'owner123',
    role:'owner',
    name:'Site Owner'
  },

  engineer1:{
    pass:'eng123',
    role:'engineer',
    name:'Mohd Azam'
  },

  supervisor1:{
    pass:'sup123',
    role:'engineer',
    name:'Rajesh Kumar'
  }

};

/* =========================
   GLOBALS
========================= */

let user = JSON.parse(
  localStorage.getItem('civil_user')
  || 'null'
);

let reports = [];

/* =========================
   TOAST
========================= */

function toast(msg,color='#238636'){

  document
    .querySelectorAll('.toast')
    .forEach(e=>e.remove());

  const t =
    document.createElement('div');

  t.className='toast';

  t.style.background=color;

  t.innerText=msg;

  document.body.appendChild(t);

  setTimeout(()=>{
    t.remove();
  },3000);
}

/* =========================
   LOGIN PAGE
========================= */

function loginPage(){

  document.getElementById('app')
  .innerHTML = `

  <div class="container">

    <div class="card"
      style="
        max-width:400px;
        margin:80px auto;
      ">

      <div class="title">
        🏗️ CivilTrack Pro
      </div>

      <div class="label">
        Username
      </div>

      <input
        id="username"
        placeholder="Enter Username"
      >

      <div class="label">
        Password
      </div>

      <input
        id="password"
        type="password"
        placeholder="Enter Password"
      >

      <button
        class="btn"
        onclick="login()">
        Login
      </button>

      <div
        style="
          margin-top:20px;
          font-size:13px;
          color:#8b949e;
          line-height:1.8;
        ">

        Owner:
        owner / owner123
        <br>

        Engineer:
        engineer1 / eng123

      </div>

    </div>

  </div>
  `;
}

/* =========================
   LOGIN
========================= */

function login(){

  const u =
    document
    .getElementById('username')
    .value
    .trim();

  const p =
    document
    .getElementById('password')
    .value
    .trim();

  const match = USERS[u];

  if(
    match &&
    match.pass === p
  ){

    user = {
      username:u,
      name:match.name,
      role:match.role
    };

    localStorage.setItem(
      'civil_user',
      JSON.stringify(user)
    );

    dashboard();

  }else{

    toast(
      'Invalid Login',
      '#e94560'
    );
  }
}

/* =========================
   LOGOUT
========================= */

function logout(){

  localStorage.removeItem(
    'civil_user'
  );

  user = null;

  loginPage();
}

/* =========================
   LOAD REPORTS
========================= */

async function loadReports(){

  const {
    data,
    error
  } = await db
    .from('reports')
    .select('*')
    .order('created_at',{
      ascending:false
    });

  if(error){

    toast(
      error.message,
      '#e94560'
    );

    return;
  }

  reports = data || [];
}

/* =========================
   SAVE REPORT
========================= */

async function saveReport(){

  const date =
    document.getElementById('date').value;

  const site =
    document.getElementById('site').value;

  const project =
    document.getElementById('project').value;

  const progress =
    document.getElementById('progress').value;

  const expenseItem =
    document.getElementById('expenseItem').value;

  const expenseAmount =
    document.getElementById('expenseAmount').value;

  if(
    !site ||
    !project ||
    !progress
  ){

    toast(
      'Fill all required fields',
      '#e3b341'
    );

    return;
  }

  const payload = {

    date:date,

    site_name:site,

    project_name:project,

    supervisor_name:user.name,

    progress:progress,

    instructions:'',

    remarks:'',

    expenses:[
      {
        item:expenseItem,
        amount:expenseAmount
      }
    ],

    photos:[]
  };

  const { error } =
    await db
      .from('reports')
      .insert([payload]);

  if(error){

    toast(
      error.message,
      '#e94560'
    );

    return;
  }

  toast('Report Saved');

  dashboard();
}

/* =========================
   DASHBOARD
========================= */

async function dashboard(){

  await loadReports();

  document.getElementById('app')
  .innerHTML = `

  <div class="container">

    <div class="topbar">

      <div
        style="
          font-size:24px;
          font-weight:bold;
        ">
        🏗️ CivilTrack Pro
      </div>

      <button
        class="logout"
        onclick="logout()">
        Logout
      </button>

    </div>

    <div class="card">

      <div
        style="
          font-size:20px;
          font-weight:bold;
          margin-bottom:20px;
        ">
        ➕ Add Site Report
      </div>

      <div class="label">
        Date
      </div>

      <input
        type="date"
        id="date"
        value="${
          new Date()
          .toISOString()
          .split('T')[0]
        }"
      >

      <div class="label">
        Site Name
      </div>

      <input
        id="site"
        placeholder="Enter Site Name"
      >

      <div class="label">
        Project Name
      </div>

      <input
        id="project"
        placeholder="Enter Project Name"
      >

      <div class="label">
        Progress
      </div>

      <textarea
        id="progress"
        rows="4"
        placeholder="Today's Progress">
      </textarea>

      <div class="label">
        Expense Item
      </div>

      <input
        id="expenseItem"
        placeholder="Cement / Sand etc"
      >

      <div class="label">
        Expense Amount
      </div>

      <input
        type="number"
        id="expenseAmount"
        placeholder="Amount"
      >

      <button
        class="btn"
        onclick="saveReport()">
        Save Report
      </button>

    </div>

    <div
      style="
        font-size:20px;
        font-weight:bold;
        margin-bottom:14px;
      ">
      📋 Reports
    </div>

    ${
      reports.length === 0

      ?

      `
      <div class="card">
        No Reports Found
      </div>
      `

      :

      reports.map(r=>`

      <div class="report">

        <div
          style="
            font-size:18px;
            font-weight:bold;
            color:#58a6ff;
          ">
          ${r.site_name}
        </div>

        <div
          style="
            margin-top:8px;
            color:#ccc;
          ">
          ${r.progress}
        </div>

        <div
          style="
            margin-top:12px;
            font-size:13px;
            color:#8b949e;
            line-height:1.8;
          ">

          📅 ${r.date}
          <br>

          👷 ${r.supervisor_name}
          <br>

          💰 ₹${
            r.expenses?.[0]?.amount || 0
          }

        </div>

      </div>

      `).join('')
    }

  </div>
  `;
}

/* =========================
   ERROR HANDLER
========================= */

window.onerror = function(
  msg,
  src,
  line
){

  toast(
    'Error: ' + msg,
    '#e94560'
  );

  console.log(
    msg,
    src,
    line
  );
};

/* =========================
   START
========================= */

if(user){
  dashboard();
}else{
  loginPage();
}

</script>

</body>
</html>
