<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CivilTrack Pro</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#0d1117;color:white}
.container{max-width:1100px;margin:auto;padding:20px}
.card{background:#161b22;border:1px solid #30363d;border-radius:14px;padding:20px;margin-bottom:20px}
.title{font-size:24px;font-weight:bold}
.topbar{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.label{margin-top:15px;margin-bottom:6px;color:#8b949e;font-size:14px}
input,textarea,select{width:100%;padding:13px;border-radius:10px;border:1px solid #30363d;background:#0d1117;color:white;font-size:15px}
textarea{resize:vertical}
input:focus,textarea:focus,select:focus{outline:none;border-color:#58a6ff}
button{border:none;border-radius:10px;padding:12px 18px;font-weight:bold;cursor:pointer}
.btn{width:100%;background:#238636;color:white;margin-top:20px}
.btn:disabled{opacity:.6;cursor:not-allowed}
.logout{background:#e94560;color:white}
.photos{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px}
.photos img{width:90px;height:90px;object-fit:cover;border-radius:10px;border:1px solid #30363d;cursor:pointer;transition:.2s}
.photos img:hover{transform:scale(1.05)}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:12px 22px;border-radius:30px;color:white;font-weight:bold;z-index:9999;max-width:90%;text-align:center}
.report{background:#0d1117;border:1px solid #30363d;padding:15px;border-radius:10px;margin-top:15px}
.footer{text-align:center;padding:20px;margin-top:30px;border-top:1px solid #30363d;color:#8b949e;font-size:13px}
.ownerTabs{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.tabBtn{padding:12px 18px;background:#161b22;border:1px solid #30363d;color:white;border-radius:10px;font-weight:bold;cursor:pointer}
.activeTab{background:#238636}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.resultBox{background:#0d1117;border:1px solid #30363d;border-radius:12px;padding:15px;margin-top:15px;line-height:1.9}
#imageModal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.95);justify-content:center;align-items:center;z-index:99999;padding:20px}
#imageModal img{max-width:95%;max-height:95%;border-radius:14px}
#closeModal{position:absolute;top:20px;right:25px;font-size:35px;cursor:pointer;color:white}
@media(max-width:600px){.topbar{flex-direction:column;align-items:flex-start}.grid2{grid-template-columns:1fr}}
</style>
</head>

<body>

<div id="app"></div>

<div id="imageModal">
  <span id="closeModal" onclick="closeImageModal()">✕</span>
  <img id="modalImage">
</div>

<script>
const SUPABASE_URL = 'https://wbqikvaixrlgaaresldq.supabase.co';

const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndicWlrdmFpeHJsZ2FhcmVzbGRxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5OTYwNjUsImV4cCI6MjA5NDU3MjA2NX0.Oq_qLGPEWv7SnpCtZ0eSDfYzZwiYeuYI64hjcz6Moqg';

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

const USERS = {
  owner:{pass:'owner123',role:'owner',name:'Site Owner'},
  engineer1:{pass:'eng123',role:'engineer',name:'MOHD AZAM'},
  supervisor1:{pass:'sup123',role:'engineer',name:'Rajesh Kumar'}
};

let user = JSON.parse(localStorage.getItem('civil_user') || 'null');
let reports = [];
let uploadedPhotos = [];
let isSaving = false;

function today(){
  return new Date().toISOString().split('T')[0];
}

function money(n){
  return '₹ ' + (Number(n || 0)).toLocaleString('en-IN',{maximumFractionDigits:2});
}

function toast(msg,color='#238636'){
  document.querySelectorAll('.toast').forEach(e=>e.remove());
  const t=document.createElement('div');
  t.className='toast';
  t.style.background=color;
  t.innerText=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),3500);
}

function loginPage(){
  document.getElementById('app').innerHTML=`
  <div class="container">
    <div class="card" style="max-width:420px;margin:80px auto;">
      <div class="title" style="text-align:center;margin-bottom:25px;">🏗️ CivilTrack Pro</div>

      <div class="label">Username</div>
      <input id="username" placeholder="Enter username">

      <div class="label">Password</div>
      <input type="password" id="password" placeholder="Enter password">

      <button class="btn" onclick="login()">Login</button>

      <div style="margin-top:20px;font-size:13px;line-height:1.8;color:#8b949e;">
        Owner: owner / owner123<br>
        Engineer: engineer1 / eng123
      </div>

      <div class="footer">© Copyright Reserved | Made by <b>MOHD AZAM</b></div>
    </div>
  </div>`;
}

function login(){
  const u=document.getElementById('username').value.trim();
  const p=document.getElementById('password').value.trim();
  const match=USERS[u];

  if(match && match.pass===p){
    user={username:u,role:match.role,name:match.name};
    localStorage.setItem('civil_user',JSON.stringify(user));
    dashboard();
  }else{
    toast('Invalid Login','#e94560');
  }
}

function logout(){
  localStorage.removeItem('civil_user');
  user=null;
  loginPage();
}

async function loadReports(){
  const {data,error}=await db
  .from('reports')
  .select('*')
  .order('date',{ascending:false})
  .order('created_at',{ascending:false});

  if(error){
    toast('Load Error: '+error.message,'#e94560');
    reports=[];
    return;
  }

  reports = (data || []).sort((a,b)=>{
    const dateA = new Date(a.date || a.created_at || 0);
    const dateB = new Date(b.date || b.created_at || 0);

    if(dateB - dateA !== 0){
      return dateB - dateA;
    }

    return new Date(b.created_at || 0) - new Date(a.created_at || 0);
  });
}

function compressImage(file){
  return new Promise((resolve)=>{
    const reader=new FileReader();

    reader.onload=function(e){
      const img=new Image();

      img.onload=function(){
        const canvas=document.createElement('canvas');

        let width=img.width;
        let height=img.height;
        const maxSize=900;

        if(width>height && width>maxSize){
          height=Math.round(height*maxSize/width);
          width=maxSize;
        }else if(height>maxSize){
          width=Math.round(width*maxSize/height);
          height=maxSize;
        }

        canvas.width=width;
        canvas.height=height;

        const ctx=canvas.getContext('2d');
        ctx.drawImage(img,0,0,width,height);

        const compressedUrl=canvas.toDataURL('image/jpeg',0.65);

        resolve({
          name:file.name,
          url:compressedUrl
        });
      };

      img.src=e.target.result;
    };

    reader.readAsDataURL(file);
  });
}

async function handlePhotos(input){
  const files=Array.from(input.files);

  if(files.length===0)return;

  toast('Photos processing...', '#58a6ff');

  const images=await Promise.all(files.map(file=>compressImage(file)));

  uploadedPhotos=[...uploadedPhotos,...images];

  renderPreview();

  toast('Photos added');
}

function renderPreview(){
  const box=document.getElementById('preview');
  if(!box)return;

  box.innerHTML=uploadedPhotos.map((p,i)=>`
    <div style="position:relative;">
      <img src="${p.url}" onclick="openImageModal('${p.url}')">
      <button onclick="removePhoto(${i})"
        style="position:absolute;top:-8px;right:-8px;background:#e94560;color:white;border-radius:50%;padding:3px 7px;font-size:11px;">
        ×
      </button>
    </div>
  `).join('');
}

function removePhoto(index){
  uploadedPhotos.splice(index,1);
  renderPreview();
}

function openImageModal(src){
  document.getElementById('modalImage').src=src;
  document.getElementById('imageModal').style.display='flex';
}

function closeImageModal(){
  document.getElementById('imageModal').style.display='none';
}

async function saveReport(){
  if(isSaving)return;

  const date=document.getElementById('date').value.trim();
  const site=document.getElementById('site').value.trim();
  const project=document.getElementById('project').value.trim();
  const progress=document.getElementById('progress').value.trim();
  const expenseItem=document.getElementById('expenseItem').value.trim();
  const expenseAmount=document.getElementById('expenseAmount').value.trim();

  if(!date || !site || !project || !progress){
    toast('Fill all required fields','#e3b341');
    return;
  }

  isSaving=true;

  const btn=document.getElementById('saveBtn');
  if(btn){
    btn.disabled=true;
    btn.innerText='Saving...';
  }

  const payload={
    date:date,
    site_name:site,
    project_name:project,
    supervisor_name:user.name,
    progress:progress,
    expenses:[{
      item:expenseItem || '',
      amount:expenseAmount || '0'
    }],
    photos:uploadedPhotos || []
  };

  const {error}=await db
  .from('reports')
  .insert([payload]);

  isSaving=false;

  if(btn){
    btn.disabled=false;
    btn.innerText='Save Report';
  }

  if(error){
    toast('Save Failed: '+error.message,'#e94560');
    console.error(error);
    return;
  }

  toast('Report Saved Successfully');

  uploadedPhotos=[];

  dashboard();
}

function showOwnerTab(id,btn){
  document.querySelectorAll('.ownerTab').forEach(tab=>{
    tab.style.display='none';
  });

  document.querySelectorAll('.tabBtn').forEach(b=>{
    b.classList.remove('activeTab');
  });

  document.getElementById(id).style.display='block';
  btn.classList.add('activeTab');
}

function calculateTender(){
  const tenderAmount = Number(document.getElementById('tenderAmount')?.value || 0);
  const rateType = document.getElementById('rateType')?.value || 'below';
  const ratePercent = Number(document.getElementById('ratePercent')?.value || 0);

  const sdpg = Number(document.getElementById('sdpg')?.value || 0);
  const gst = Number(document.getElementById('gst')?.value || 0);
  const royalty = Number(document.getElementById('royalty')?.value || 0);
  const labourCess = Number(document.getElementById('labourCess')?.value || 0);
  const otherDeduction = Number(document.getElementById('otherDeduction')?.value || 0);

  let quotedAmount = tenderAmount;

  if(rateType === 'below'){
    quotedAmount = tenderAmount - (tenderAmount * ratePercent / 100);
  }

  if(rateType === 'above'){
    quotedAmount = tenderAmount + (tenderAmount * ratePercent / 100);
  }

  const sdpgAmt = quotedAmount * sdpg / 100;
  const gstAmt = quotedAmount * gst / 100;
  const royaltyAmt = quotedAmount * royalty / 100;
  const labourCessAmt = quotedAmount * labourCess / 100;
  const otherAmt = quotedAmount * otherDeduction / 100;

  const totalDeduction = sdpgAmt + gstAmt + royaltyAmt + labourCessAmt + otherAmt;
  const netAmount = quotedAmount - totalDeduction;

  const result = document.getElementById('tenderResult');

  if(!result)return;

  result.innerHTML = `
    <div><b>Tender Amount:</b> ${money(tenderAmount)}</div>
    <div><b>${rateType === 'below' ? 'Below' : 'Above'} ${ratePercent}% ke baad Amount:</b> ${money(quotedAmount)}</div>
    <hr style="border:0;border-top:1px solid #30363d;margin:10px 0;">
    <div>SD/PG Deduction: ${money(sdpgAmt)}</div>
    <div>GST Deduction: ${money(gstAmt)}</div>
    <div>Royalty Deduction: ${money(royaltyAmt)}</div>
    <div>Labour Cess Deduction: ${money(labourCessAmt)}</div>
    <div>Other/Office Deduction: ${money(otherAmt)}</div>
    <hr style="border:0;border-top:1px solid #30363d;margin:10px 0;">
    <div style="font-size:18px;color:#e3b341;"><b>Total Deduction:</b> ${money(totalDeduction)}</div>
    <div style="font-size:24px;color:#3fb950;margin-top:6px;"><b>Net Amount:</b> ${money(netAmount)}</div>
  `;
}

async function dashboard(){
  await loadReports();

  let myReports=reports;

  if(user.role!=='owner'){
    myReports=reports.filter(r=>r.supervisor_name===user.name);
  }

  document.getElementById('app').innerHTML=`
  <div class="container">
    <div class="topbar">
      <div class="title">🏗️ CivilTrack Pro</div>

      <div style="display:flex;align-items:center;gap:10px;">
        <div>${user.role==='owner'?'👑 Owner':'👷 Engineer'} : ${user.name}</div>
        <button class="logout" onclick="logout()">Logout</button>
      </div>
    </div>

    ${
      user.role!=='owner'
      ?
      `
      <div class="card">
        <div style="font-size:22px;font-weight:bold;margin-bottom:18px;">➕ Add Site Report</div>

        <div class="label">Date *</div>
        <input type="date" id="date" value="${today()}">

        <div class="label">Site Name *</div>
        <input id="site" placeholder="Enter site name">

        <div class="label">Project Name *</div>
        <input id="project" placeholder="Enter project name">

        <div class="label">Today's Progress *</div>
        <textarea id="progress" rows="4" placeholder="Write today's progress"></textarea>

        <div class="label">Expense Item</div>
        <input id="expenseItem" placeholder="Cement / Sand etc">

        <div class="label">Expense Amount</div>
        <input type="number" id="expenseAmount" placeholder="Enter amount">

        <div class="label">Upload Site Photos</div>
        <input type="file" multiple accept="image/*" onchange="handlePhotos(this)">

        <div class="photos" id="preview"></div>

        <button id="saveBtn" class="btn" onclick="saveReport()">Save Report</button>
      </div>

      <div class="card">
        <div style="font-size:22px;font-weight:bold;margin-bottom:15px;">📋 My Reports</div>

        ${
          myReports.length===0
          ? `<div style="color:#8b949e;">No Reports Found</div>`
          : myReports.map(r=>`
            <div class="report">
              <div style="font-size:18px;font-weight:bold;color:#58a6ff;">${r.project_name || ''}</div>
              <div style="margin-top:5px;color:#8b949e;">🏗️ ${r.site_name || ''}</div>
              <div style="margin-top:12px;line-height:1.7;">${r.progress || ''}</div>
              <div style="margin-top:10px;font-size:13px;color:#8b949e;">📅 ${r.date || ''}</div>

              ${
                r.photos && r.photos.length>0
                ? `<div class="photos">
                    ${r.photos.map(p=>`
                      <img src="${p.url}" onclick="openImageModal('${p.url}')">
                    `).join('')}
                   </div>`
                : ''
              }
            </div>
          `).join('')
        }
      </div>
      `
      :
      `
      <div class="ownerTabs">
        <button class="tabBtn activeTab" onclick="showOwnerTab('tenderAnalysis',this)">📑 Tender Analysis</button>
        <button class="tabBtn" onclick="showOwnerTab('siteProgress',this)">📈 Site Progress</button>
        <button class="tabBtn" onclick="showOwnerTab('futureFunds',this)">💰 Future Funds</button>
      </div>

      <div id="tenderAnalysis" class="ownerTab">
        <div class="card">
          <div style="font-size:24px;font-weight:bold;margin-bottom:15px;">📑 Tender Analysis Calculator</div>

          <div class="grid2">
            <div>
              <div class="label">Tender Amount *</div>
              <input type="number" id="tenderAmount" placeholder="Example: 6500000" oninput="calculateTender()">
            </div>

            <div>
              <div class="label">Above / Below</div>
              <select id="rateType" onchange="calculateTender()">
                <option value="below">Below</option>
                <option value="above">Above</option>
              </select>
            </div>

            <div>
              <div class="label">Above/Below Percent %</div>
              <input type="number" id="ratePercent" placeholder="Example: 13" value="0" oninput="calculateTender()">
            </div>

            <div>
              <div class="label">SD/PG %</div>
              <input type="number" id="sdpg" placeholder="Example: 5" value="0" oninput="calculateTender()">
            </div>

            <div>
              <div class="label">GST %</div>
              <input type="number" id="gst" placeholder="Example: 2" value="0" oninput="calculateTender()">
            </div>

            <div>
              <div class="label">Royalty %</div>
              <input type="number" id="royalty" placeholder="Example: 1" value="0" oninput="calculateTender()">
            </div>

            <div>
              <div class="label">Labour Cess %</div>
              <input type="number" id="labourCess" placeholder="Example: 1" value="0" oninput="calculateTender()">
            </div>

            <div>
              <div class="label">Other / Office Deduction %</div>
              <input type="number" id="otherDeduction" placeholder="Example: 1" value="0" oninput="calculateTender()">
            </div>
          </div>

          <button class="btn" onclick="calculateTender()">Calculate Net Amount</button>

          <div id="tenderResult" class="resultBox">
            Tender amount aur percentage bharne ke baad yahan net amount show hoga.
          </div>

          <div style="margin-top:20px;line-height:2;font-size:15px;color:#8b949e;">
            ✅ Total Reports : <b>${reports.length}</b><br>
            ✅ Total Projects : <b>${new Set(reports.map(r=>r.project_name)).size}</b><br>
            ✅ Total Engineers : <b>${new Set(reports.map(r=>r.supervisor_name)).size}</b><br>
            ✅ System Status : <b style="color:#3fb950;">ACTIVE</b>
          </div>
        </div>
      </div>

      <div id="siteProgress" class="ownerTab" style="display:none;">
        <div class="card">
          <div style="font-size:24px;font-weight:bold;margin-bottom:18px;">📈 Site Progress</div>

          ${
            reports.length===0
            ? `<div style="color:#8b949e;">No Reports Found</div>`
            : reports.map(r=>`
              <div class="report">
                <div style="font-size:20px;font-weight:bold;color:#58a6ff;">${r.project_name || ''}</div>
                <div style="margin-top:5px;color:#8b949e;">🏗️ ${r.site_name || ''}</div>
                <div style="margin-top:12px;line-height:1.8;">${r.progress || ''}</div>

                <div style="margin-top:12px;font-size:13px;color:#8b949e;line-height:1.8;">
                  📅 ${r.date || ''}<br>
                  👷 ${r.supervisor_name || ''}
                </div>

                ${
                  r.photos && r.photos.length>0
                  ? `<div class="photos">
                      ${r.photos.map(p=>`
                        <img src="${p.url}" onclick="openImageModal('${p.url}')">
                      `).join('')}
                     </div>`
                  : ''
                }
              </div>
            `).join('')
          }
        </div>
      </div>

      <div id="futureFunds" class="ownerTab" style="display:none;">
        <div class="card">
          <div style="font-size:24px;font-weight:bold;margin-bottom:15px;">💰 Future Funds</div>

          <div style="font-size:40px;font-weight:bold;color:#3fb950;">
            ₹ ${
              reports.reduce((sum,r)=>{
                return sum + (Number(r.expenses?.[0]?.amount) || 0);
              },0).toLocaleString()
            }
          </div>

          <div style="margin-top:10px;color:#8b949e;">
            Estimated Future Fund Summary
          </div>
        </div>
      </div>
      `
    }

    <div class="footer">
      © Copyright Reserved | Made by <b>MOHD AZAM</b>
    </div>
  </div>`;
}

document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){
    closeImageModal();
  }
});

if(user){
  dashboard();
}else{
  loginPage();
}
</script>

</body>
</html>
