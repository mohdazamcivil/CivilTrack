<script>

function tenderPDF(d){

  const expRows = ([
    { l:`SD / PG (${d.sdPct}%)`, v:d.sdAmt },
    { l:`GST (${d.gstPct}%)`, v:d.gstAmt },
    { l:`Labour Cess (${d.labPct}%)`, v:d.labAmt },
    { l:`Royalty Tax (${d.royPct}%)`, v:d.royAmt }
  ]).map(x => `
    <tr>
      <td style="padding:10px 14px;border-bottom:1px solid #eee;">
        ${x.l}
      </td>

      <td style="
        padding:10px 14px;
        border-bottom:1px solid #eee;
        text-align:right;
        font-weight:700;
        color:#c62828;
      ">
        ${fmtMoney(x.v)}
      </td>
    </tr>
  `).join('');

  const html = `
  <!DOCTYPE html>

  <html lang="en">

  <head>

    <meta charset="UTF-8"/>

    <title>
      Tender Analysis
    </title>

    <style>

      *{
        margin:0;
        padding:0;
        box-sizing:border-box;
      }

      body{
        font-family:Arial,sans-serif;
        color:#222;
        padding:30px;
        background:#fff;
      }

      .hdr{
        background:linear-gradient(135deg,#1a1a2e,#0f3460);
        color:#fff;
        padding:26px 30px;
        border-radius:12px;
        margin-bottom:22px;
      }

      .hdr h1{
        font-size:24px;
        margin-bottom:6px;
      }

      .hdr p{
        font-size:12px;
        opacity:.8;
      }

      .box{
        background:#f5f7fa;
        border-radius:10px;
        overflow:hidden;
        margin-bottom:16px;
      }

      .bt{
        padding:12px 14px;
        background:#1a1a2e;
        color:#fff;
        font-size:13px;
        font-weight:700;
        text-transform:uppercase;
      }

      table{
        width:100%;
        border-collapse:collapse;
      }

      td{
        font-size:14px;
      }

      .net{
        background:#e8f5e9;
        border:2px solid #4caf50;
        border-radius:12px;
        padding:24px;
        text-align:center;
        margin-top:18px;
      }

      .footer{
        margin-top:30px;
        text-align:center;
        font-size:12px;
        color:#777;
        border-top:1px solid #eee;
        padding-top:14px;
      }

    </style>

  </head>

  <body>

    <!-- HEADER -->
    <div class="hdr">

      <h1>
        🏗️ CivilTrack Pro — Tender Analysis
      </h1>

      <p>
        ${d.name || 'Tender Analysis Report'}
        |
        Generated:
        ${new Date().toLocaleDateString(
          'en-IN',
          {
            day:'2-digit',
            month:'long',
            year:'numeric'
          }
        )}
      </p>

    </div>

    <!-- TENDER DETAILS -->
    <div class="box">

      <div class="bt">
        📋 Tender Details
      </div>

      <table>

        <tr>

          <td style="
            padding:10px 14px;
            border-bottom:1px solid #eee;
          ">
            Tender Amount
          </td>

          <td style="
            padding:10px 14px;
            border-bottom:1px solid #eee;
            text-align:right;
            font-weight:700;
          ">
            ${fmtMoney(d.amt)}
          </td>

        </tr>

        <tr>

          <td style="
            padding:10px 14px;
            border-bottom:1px solid #eee;
          ">
            ${d.dir === 'below'
              ? 'Below ▼'
              : 'Above ▲'} Percentage
          </td>

          <td style="
            padding:10px 14px;
            border-bottom:1px solid #eee;
            text-align:right;
            font-weight:700;
          ">
            ${d.pct}%
          </td>

        </tr>

        <tr>

          <td style="
            padding:10px 14px;
          ">
            Quoted Amount
          </td>

          <td style="
            padding:10px 14px;
            text-align:right;
            font-weight:700;
            color:${d.dir === 'below'
              ? '#e65100'
              : '#2e7d32'};
          ">
            ${fmtMoney(d.quoted)}
          </td>

        </tr>

      </table>

    </div>

    <!-- DEDUCTIONS -->
    <div class="box">

      <div class="bt">
        🔻 Deductions
      </div>

      <table>

        ${expRows}

        <tr style="background:#fff0f0;">

          <td style="
            padding:12px 14px;
            font-weight:700;
          ">
            Total Deductions
          </td>

          <td style="
            padding:12px 14px;
            text-align:right;
            font-weight:900;
            color:#c62828;
          ">
            ${fmtMoney(d.totalDed)}
          </td>

        </tr>

      </table>

    </div>

    <!-- NET RESULT -->
    <div class="net">

      <div style="
        font-size:12px;
        color:#555;
        text-transform:uppercase;
        letter-spacing:.5px;
      ">
        ✅ Net Working Amount
      </div>

      <div style="
        font-size:36px;
        font-weight:900;
        color:#2e7d32;
        margin-top:8px;
      ">
        ${fmtMoney(d.net)}
      </div>

      <div style="
        font-size:13px;
        color:#555;
        margin-top:6px;
      ">
        ${d.netPct}% of original tender amount
      </div>

    </div>

    <!-- FOOTER -->
    <div class="footer">

      © Made by
      <strong>
        Mohd Azam
      </strong>

      | CivilTrack Pro — All Rights Reserved

    </div>

    <script>
      window.onload = () => window.print();
    <\/script>

  </body>

  </html>
  `;

  const blob = new Blob(
    [html],
    { type:'text/html' }
  );

  const url = URL.createObjectURL(blob);

  window.open(url,'_blank');

  setTimeout(() => {
    URL.revokeObjectURL(url);
  }, 5000);
}

</script>
