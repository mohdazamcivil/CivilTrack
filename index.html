body{background:#0d1117;color:white}

input,textarea,select{width:100%;padding:13px;border-radius:10px;border:1px solid #30363d;background:#0d1117;color:white;font-size:15px}
textarea{resize:vertical}
input:focus,textarea:focus,select:focus{outline:none;border-color:#58a6ff}
button{border:none;border-radius:10px;padding:12px 18px;font-weight:bold;cursor:pointer}

.photos img{width:90px;height:90px;object-fit:cover;border-radius:10px;border:1px solid #30363d;cursor:pointer;transition:.2s}
.photos img:hover{transform:scale(1.05)}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:12px 22px;border-radius:30px;color:white;font-weight:bold;z-index:9999;max-width:90%;text-align:center}

.ownerTabs,.subTabs{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.tabBtn,.subTabBtn{padding:12px 18px;background:#161b22;border:1px solid #30363d;color:white;border-radius:10px;font-weight:bold;cursor:pointer}
.activeTab{background:#238636}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.resultBox{background:#0d1117;border:1px solid #30363d;border-radius:12px;padding:15px;margin-top:15px;line-height:1.9}
.notifyCard{background:#0d1117;border:1px solid #30363d;border-left:5px solid #e3b341;border-radius:12px;padding:15px;margin-top:12px}
.notifyDue{border-left-color:#e94560}

  }).subscribe();
}

function compressImage(file){
  return new Promise((resolve)=>{
    const reader=new FileReader();

    reader.onload=function(e){
      const img=new Image();

      img.onload=function(){
        const canvas=document.createElement('canvas');
        let width=img.width;
        let height=img.height;

        const maxSize=700;

        if(width>height && width>maxSize){
          height=Math.round(height*maxSize/width);
          width=maxSize;
        }else if(height>maxSize){
          width=Math.round(width*maxSize/height);
          height=maxSize;
        }

        canvas.width=width;
        canvas.height=height;

        const ctx=canvas.getContext('2d');
        ctx.drawImage(img,0,0,width,height);

        resolve({
          name:file.name,
          url:canvas.toDataURL('image/jpeg',0.55)
        });
      };

      img.src=e.target.result;
    };

    reader.readAsDataURL(file);
  });
}

  if(files.length===0)return;

  const imgs=await Promise.all(files.map(file=>compressImage(file)));

async function saveReport(){
  if(isSaving)return;

  const payload={
    date:document.getElementById('date').value,
    state:document.getElementById('state').value,
    district:document.getElementById('district').value,
    block:getBlockValue(),
    site_name:document.getElementById('site').value,
    project_name:document.getElementById('project').value,
    supervisor_name:user.name,
    progress:document.getElementById('progress').value,
    expenses:[{
      item:document.getElementById('expenseItem').value,
      amount:document.getElementById('expenseAmount').value
    }],
    photos:uploadedPhotos
  };

  if(!payload.site_name || !payload.project_name || !payload.progress){
    toast('Fill Required Fields','#e3b341');
    return;
  }

  isSaving=true;

  const {data,error}=await db
  .from('reports')
  .insert([payload])
  .select()
  .single();

  isSaving=false;

  if(error){
    toast('Save Failed','#e94560');
    return;
  }

  reports=[data,...reports];
  saveCache();

  uploadedPhotos=[];

  toast('Progress Saved');
  renderDashboard();
}

  renderDashboard();
}

async function toggleFulfilled(id,type='engineer'){

  const report=materialReports.find(x=>x.id===id);

  if(!report)return;

  let updateObj={};

  if(type==='engineer'){
    updateObj.engineer_fulfilled=!report.engineer_fulfilled;
  }else{
    updateObj.owner_fulfilled=!report.owner_fulfilled;
  }

  updateObj.fulfilled_at=new Date().toISOString();

  const {error}=await db
  .from('material_reports')
  .update(updateObj)
  .eq('id',id);

  if(error){
    toast('Update Failed','#e94560');
    return;
  }

  Object.assign(report,updateObj);

  renderDashboard();
}

function materialPDF(){

  const html=`
  <html>
  <head>
  <title>Material Report</title>
  <style>
  body{font-family:Arial;padding:20px}
  h1{text-align:center}
  table{width:100%;border-collapse:collapse;margin-top:20px}
  th,td{border:1px solid #ddd;padding:10px;text-align:left}
  th{background:#333;color:#fff}
  </style>
  </head>
  <body>
  <h1>Material Requirement Report</h1>

  <table>
  <tr>
    <th>Date</th>
    <th>Site</th>
    <th>Project</th>
    <th>Requirement</th>
    <th>Status</th>
  </tr>

  ${materialReports.map(r=>`
    <tr>
      <td>${r.date}</td>
      <td>${r.site_name}</td>
      <td>${r.project_name}</td>
      <td>${(r.requirements||[]).map(x=>x.item+' ('+x.qty+')').join(', ')}</td>
      <td>${r.owner_fulfilled || r.engineer_fulfilled ? 'Fulfilled':'Pending'}</td>
    </tr>
  `).join('')}

  </table>

  <script>window.onload=()=>window.print()<\/script>

  </body>
  </html>`;

  const blob=new Blob([html],{type:'text/html'});
  window.open(URL.createObjectURL(blob));
}

function renderReportsList(list){

  if(list.length===0){
    return `<div style="color:#8b949e;">No Reports Found</div>`;
  }

  return list.map(r=>`
    <div class="report">

      <div style="display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;">
        <div>
          <div style="font-size:20px;font-weight:bold;color:#58a6ff;">${r.project_name}</div>
          <div style="margin-top:5px;color:#8b949e;">🏗️ ${r.site_name}</div>
        </div>

        <div style="text-align:right;font-size:13px;color:#8b949e;">
          📅 ${r.date}<br>
          👷 ${r.supervisor_name}
        </div>
      </div>

      <div style="margin-top:12px;line-height:1.8;">${r.progress || ''}</div>

      ${
        r.photos && r.photos.length>0
        ? `<div class="photos">
          ${r.photos.map(p=>`<img src="${p.url}" onclick="openImageModal('${p.url}')">`).join('')}
          </div>`
        : ''
      }

    </div>
  `).join('');
}

function renderMaterialList(list){

  if(list.length===0){
    return `<div style="color:#8b949e;">No Material Reports Found</div>`;
  }

  return list.map(r=>`

    <div class="report">

      <div style="display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;">

        <div>
          <div style="font-size:20px;font-weight:bold;color:#58a6ff;">${r.project_name}</div>
          <div style="margin-top:5px;color:#8b949e;">🏗️ ${r.site_name}</div>
          <div style="margin-top:5px;color:#8b949e;">📍 ${r.state} / ${r.district} / ${r.block}</div>
        </div>

        <div style="text-align:right;">
          ${
            r.owner_fulfilled || r.engineer_fulfilled
            ? `<span class="statusBadge fulfilled">FULFILLED</span>`
            : `<span class="statusBadge pending">PENDING</span>`
          }

          <div style="margin-top:8px;font-size:13px;color:#8b949e;">
            📅 ${r.date}<br>
            👷 ${r.supervisor_name}
          </div>
        </div>

      </div>

      <div style="margin-top:15px;">

        <div style="font-weight:bold;color:#e3b341;">📦 Available Stock</div>

        <div style="margin-top:8px;line-height:1.8;">
          ${(r.stock_items || []).map(x=>`${x.name}: ${x.qty}`).join('<br>')}
        </div>

        <div style="margin-top:15px;font-weight:bold;color:#58a6ff;">🛒 Required Materials</div>

        <div style="margin-top:8px;line-height:1.8;">
          ${(r.requirements || []).map(x=>`${x.item}: ${x.qty}`).join('<br>')}
        </div>

        <div style="margin-top:12px;">
          ⏳ Stock Remaining Days: <b>${r.stock_days || 0} Days</b>
        </div>

        ${
          r.remarks
          ? `<div style="margin-top:12px;">📝 ${r.remarks}</div>`
          : ''
        }

      </div>

      ${
        r.photos && r.photos.length>0
        ? `<div class="photos">
          ${r.photos.map(p=>`<img src="${p.url}" onclick="openImageModal('${p.url}')">`).join('')}
          </div>`
        : ''
      }

      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:15px;">

        <button class="smallBtn"
        onclick="toggleFulfilled('${r.id}','engineer')"
        style="background:#238636;color:white;">
        Engineer Fulfilled
        </button>

        <button class="smallBtn"
        onclick="toggleFulfilled('${r.id}','owner')"
        style="background:#58a6ff;color:white;">
        Owner Fulfilled
        </button>

      </div>

    </div>

  `).join('');
}

function renderDashboard(){

  let myReports=reports;
  let myMaterials=materialReports;

  if(user.role!=='owner'){
    myReports=reports.filter(r=>r.supervisor_name===user.name);
    myMaterials=materialReports.filter(r=>r.supervisor_name===user.name);
  }

  document.getElementById('app').innerHTML=`
  <div class="container">

    <div class="topbar">
      <div class="title">🏗️ CivilTrack Pro</div>

      <div style="display:flex;align-items:center;gap:10px;">
        <div>${user.role==='owner'?'👑 Owner':'👷 Engineer'} : ${user.name}</div>
        <button class="logout" onclick="logout()">Logout</button>
      </div>
    </div>

    ${
      user.role!=='owner'
      ?

      `
      <div class="subTabs">
        <button class="subTabBtn ${engineerSubTab==='progress'?'activeTab':''}"
        onclick="engineerSubTab='progress';renderDashboard()">📈 Site Progress</button>

        <button class="subTabBtn ${engineerSubTab==='materials'?'activeTab':''}"
        onclick="engineerSubTab='materials';renderDashboard()">📦 Material Requirement</button>
      </div>

      ${
        engineerSubTab==='progress'
        ?

        `
        <div class="card">

          <div style="font-size:22px;font-weight:bold;margin-bottom:18px;">➕ Add Site Progress</div>

          <div class="label">Date</div>
          <input type="date" id="date" value="${today()}">

          <div class="grid2">

            <div>
              <div class="label">State</div>
              <select id="state" onchange="updateEngineerDistricts()">
                ${stateOptions('')}
              </select>
            </div>

            <div>
              <div class="label">District</div>
              <select id="district" onchange="updateEngineerBlocks()">
                <option>Select District</option>
              </select>
            </div>

            <div>
              <div class="label">Block / Place</div>
              <select id="block" onchange="toggleCustomBlock()">
                <option>Select District First</option>
              </select>
            </div>

            <div id="customBlockBox" style="display:none;">
              <div class="label">Custom Block</div>
              <input id="customBlock">
            </div>

          </div>

          <div class="label">Site Name</div>
          <input id="site">

          <div class="label">Project Name</div>
          <input id="project">

          <div class="label">Today's Progress</div>
          <textarea id="progress" rows="4"></textarea>

          <div class="grid2">

            <div>
              <div class="label">Expense Item</div>
              <input id="expenseItem">
            </div>

            <div>
              <div class="label">Expense Amount</div>
              <input type="number" id="expenseAmount">
            </div>

          </div>

          <div class="label">Upload Photos</div>
          <input type="file" multiple accept="image/*" onchange="handlePhotos(this)">

          <div class="photos" id="preview"></div>

          <button class="btn" onclick="saveReport()">Save Progress</button>

        </div>

        <div class="card">
          <div style="font-size:22px;font-weight:bold;margin-bottom:15px;">📋 My Site Progress</div>
          ${renderReportsList(myReports)}
        </div>
        `

        :

        `
        <div class="card">

          <div style="font-size:22px;font-weight:bold;margin-bottom:18px;">📦 Material Requirement</div>

          <div class="label">Date</div>
          <input type="date" id="mdate" value="${today()}">

          <div class="grid2">

            <div>
              <div class="label">State</div>
              <select id="mstate" onchange="updateEngineerDistricts('m')">
                ${stateOptions('')}
              </select>
            </div>

            <div>
              <div class="label">District</div>
              <select id="mdistrict" onchange="updateEngineerBlocks('m')">
                <option>Select District</option>
              </select>
            </div>

            <div>
              <div class="label">Block / Place</div>
              <select id="mblock" onchange="toggleCustomBlock('m')">

          <input id="mproject">

          <div class="grid3">

            <div><div class="label">Sand</div><input id="sandQty"></div>
            <div><div class="label">Aggregate</div><input id="aggregateQty"></div>

        onclick="activeOwnerTab='siteProgress';renderDashboard()">📈 Site Progress</button>

          <button class="subTabBtn ${ownerProgressSubTab==='progress'?'activeTab':''}"

        </div>

          <div class="grid3">

              <select id="ownerStateFilter" onchange="updateOwnerDistricts()">

              </select>
            </div>

            </div>

          </div>

        ${

          ?

          `

              (!ownerStateFilter || r.state===ownerStateFilter) &&
              (!ownerDistrictFilter || r.district===ownerDistrictFilter) &&
              (!ownerBlockFilter || r.block===ownerBlockFilter)
            ))}
          </div>
          `

          :

          `
          <div class="card">

            <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;">
              <div style="font-size:22px;font-weight:bold;">📦 Material Reports</div>

              <button class="smallBtn" onclick="materialPDF()"
              style="background:#e3b341;color:black;">
              Download PDF
              </button>
            </div>

            ${renderMaterialList(materialReports.filter(r=>
              (!ownerStateFilter || r.state===ownerStateFilter) &&
              (!ownerDistrictFilter || r.district===ownerDistrictFilter) &&
              (!ownerBlockFilter || r.block===ownerBlockFilter)
            ))}

          </div>
          `
        }

        `

        :

        `
        <div class="card">
          <div style="font-size:24px;font-weight:bold;">${activeOwnerTab==='tenderAnalysis'?'📑 Tender Analysis':'💰 Future Funds'}</div>
          <div style="margin-top:20px;color:#8b949e;">
            Existing feature preserved.
          </div>
        </div>
        `
      }

      `
    }

    <div class="footer">
      © Copyright Reserved | Made by <b>MOHD AZAM</b>
    </div>

  </div>`;
}

document.addEventListener('keydown',function(e){
  if(e.key==='Escape') closeImageModal();
});

if(user){
  renderDashboard();
  loadReports(true);
  loadMaterialReports(true);
  startRealtime();
}else{
  loginPage();
}
</script>
</body>
