<!-- IMAGE VIEWER MODAL START -->

<div id="imageModal"
style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
z-index:99999;
justify-content:center;
align-items:center;
padding:20px;
">

  <span
    onclick="closeImageModal()"
    style="
      position:absolute;
      top:20px;
      right:25px;
      font-size:35px;
      color:white;
      cursor:pointer;
      font-weight:bold;
    ">
    ✕
  </span>

  <img
    id="modalImage"
    style="
      max-width:95%;
      max-height:95%;
      border-radius:14px;
      object-fit:contain;
      box-shadow:0 0 25px rgba(255,255,255,0.15);
    "
  >

</div>

<!-- IMAGE VIEWER MODAL END -->
