<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CivilTrack Pro</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#0d1117;
  color:white;
}

.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

.card{
  background:#161b22;
  border:1px solid #30363d;
  border-radius:14px;
  padding:18px;
  margin-bottom:18px;
}

input,
textarea{
  width:100%;
  padding:12px;
  border-radius:8px;
  border:1px solid #30363d;
  background:#0d1117;
  color:white;
  margin-top:6px;
  font-size:15px;
}

input[type="date"]{
  appearance:auto;
  -webkit-appearance:auto;
  color-scheme:dark;
  cursor:pointer;
}

textarea{
  resize:vertical;
}

button{
  border:none;
  border-radius:8px;
  padding:12px 18px;
  font-weight:bold;
  cursor:pointer;
}

.btn{
  background:#238636;
  color:white;
  width:100%;
  margin-top:18px;
}

.logout{
  background:#e94560;
  color:white;
}

.label{
  margin-top:14px;
  margin-bottom:5px;
  color:#8b949e;
  font-size:14px;
}

.title{
  font-size:24px;
  font-weight:bold;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.report{
  background:#0d1117;
  border:1px solid #30363d;
  border-radius:10px;
  padding:15px;
  margin-top:12px;
}

.toast{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:#238636;
  color:white;
  padding:12px 20px;
  border-radius:30px;
  z-index:9999;
}

.photos{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:10px;
}

.photos img{
  width:90px;
  height:90px;
  object-fit:cover;
  border-radius:10px;
  border:1px solid #30363d;
}

.date-box{
  position:relative;
}

.date-icon{
  position:absolute;
  right:14px;
  top:19px;
  pointer-events:none;
}

@media(max-width:600px){

  .topbar{
    flex-direction:column;
    gap:12px;
    align-items:flex-start;
  }

}

</style>
</head>

<body>

<div id="app"></div>

<script>

/* =========================
   SUPABASE
========================= */

const SUPABASE_URL =
'https://wbqikvaixrlgaaresldq.supabase.co';

const SUPABASE_KEY =
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndicWlrdmFpeHJsZ2FhcmVzbGRxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5OTYwNjUsImV4cCI6MjA5NDU3MjA2NX0.Oq_qLGPEWv7SnpCtZ0eSDfYzZwiYeuYI64hjcz6Moqg';

const { createClient } = supabase;

const db = createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

/* =========================
   USERS
========================= */

const USERS = {

  owner:{
    pass:'owner123',
    role:'owner',
    name:'Site Owner'
  },

  engineer1:{
    pass:'eng123',
    role:'engineer',
    name:'Mohd Azam'
  },

  supervisor1:{
    pass:'sup123',
    role:'engineer',
    name:'Rajesh Kumar'
  }

};

/* =========================
   GLOBALS
========================= */

let user = JSON.parse(
  localStorage.getItem('civil_user')
  || 'null'
);

let reports = [];

let uploadedPhotos = [];

/* =========================
   TOAST
========================= */

function toast(msg,color='#238636'){

  document
    .querySelectorAll('.toast')
    .forEach(e=>e.remove());

  const t =
    document.createElement('div');

  t.className='toast';

  t.style.background=color;

  t.innerText=msg;

  document.body.appendChild(t);

  setTimeout(()=>{
    t.remove();
  },3000);
}

/* =========================
   LOGIN PAGE
========================= */

function loginPage(){

  document.getElementById('app')
  .innerHTML = `

  <div class="container">

    <div class="card"
      style="
        max-width:400px;
        margin:80px auto;
      ">

      <div class="title"
        style="
          text-align:center;
          margin-bottom:25px;
        ">
        🏗️ CivilTrack Pro
      </div>

      <div class="label">
        Username
      </div>

      <input
        id="username"
        placeholder="Username"
      >

      <div class="label">
        Password
      </div>

      <input
        type="password"
        id="password"
        placeholder="Password"
      >

      <button
        class="btn"
        onclick="login()">
        Login
      </button>

      <div
        style="
          margin-top:20px;
          font-size:13px;
          color:#8b949e;
          line-height:1.8;
        ">

        Owner:
        owner / owner123

        <br>

        Engineer:
        engineer1 / eng123

      </div>

    </div>

  </div>
  `;
}

/* =========================
   LOGIN
========================= */

function login(){

  const u =
    document
    .getElementById('username')
    .value
    .trim();

  const p =
    document
    .getElementById('password')
    .value
    .trim();

  const match = USERS[u];

  if(
    match &&
    match.pass === p
  ){

    user = {
      username:u,
      name:match.name,
      role:match.role
    };

    localStorage.setItem(
      'civil_user',
      JSON.stringify(user)
    );

    dashboard();

  }else{

    toast(
      'Invalid Login',
      '#e94560'
    );
  }
}

/* =========================
   LOGOUT
========================= */

function logout(){

  localStorage.removeItem(
    'civil_user'
  );

  user = null;

  loginPage();
}

/* =========================
   LOAD REPORTS
========================= */

async function loadReports(){

  const {
    data,
    error
  } = await db
    .from('reports')
    .select('*')
    .order('created_at',{
      ascending:false
    });

  if(error){

    toast(
      error.message,
      '#e94560'
    );

    return;
  }

  reports = data || [];
}

/* =========================
   PHOTOS
========================= */

function handlePhotos(input){

  const files =
    Array.from(input.files);

  Promise.all(

    files.map(file=>{

      return new Promise(resolve=>{

        const reader =
          new FileReader();

        reader.onload = e => {

          resolve({
            name:file.name,
            url:e.target.result
          });

        };

        reader.readAsDataURL(file);

      });

    })

  ).then(images=>{

    uploadedPhotos = [
      ...uploadedPhotos,
      ...images
    ];

    renderPhotoPreview();

  });

}

function renderPhotoPreview(){

  const box =
    document.getElementById('preview');

  if(!box) return;

  box.innerHTML =
    uploadedPhotos.map(p=>`

      <img src="${p.url}">

    `).join('');
}

/* =========================
   SAVE REPORT
========================= */

async function saveReport(){

  const date =
    document.getElementById('date').value;

  const site =
    document.getElementById('site').value;

  const project =
    document.getElementById('project').value;

  const progress =
    document.getElementById('progress').value;

  const expenseItem =
    document.getElementById('expenseItem').value;

  const expenseAmount =
    document.getElementById('expenseAmount').value;

  if(
    !site ||
    !project ||
    !progress
  ){

    toast(
      'Fill all required fields',
      '#e3b341'
    );

    return;
  }

  const payload = {

    date:date,

    site_name:site,

    project_name:project,

    supervisor_name:user.name,

    progress:progress,

    instructions:'',

    remarks:'',

    expenses:[
      {
        item:expenseItem,
        amount:expenseAmount
      }
    ],

    photos:uploadedPhotos
  };

  const { error } =
    await db
      .from('reports')
      .insert([payload]);

  if(error){

    toast(
      error.message,
      '#e94560'
    );

    return;
  }

  toast('Report Saved Successfully');

  uploadedPhotos = [];

  dashboard();
}

/* =========================
   DASHBOARD
========================= */

async function dashboard(){

  await loadReports();

  let filteredReports = reports;

  if(user.role !== 'owner'){

    filteredReports =
      reports.filter(r =>
        r.supervisor_name === user.name
      );

  }

  document.getElementById('app')
  .innerHTML = `

  <div class="container">

    <div class="topbar">

      <div class="title">
        🏗️ CivilTrack Pro
      </div>

      <div
        style="
          display:flex;
          gap:10px;
          align-items:center;
        ">

        <div>

          ${
            user.role === 'owner'
            ? '👑 Owner'
            : '👷 Engineer'
          }

          :
          ${user.name}

        </div>

        <button
          class="logout"
          onclick="logout()">
          Logout
        </button>

      </div>

    </div>

    ${
      user.role !== 'owner'

      ?

      `

      <div class="card">

        <div
          style="
            font-size:20px;
            font-weight:bold;
            margin-bottom:20px;
          ">

          ➕ Add Site Report

        </div>

        <div class="label">
          Date
        </div>

        <div class="date-box">

          <input
            type="date"
            id="date"
            onclick="this.showPicker && this.showPicker()"
            value="${
              new Date()
              .toISOString()
              .split('T')[0]
            }"
          >

          <div class="date-icon">
            📅
          </div>

        </div>

        <div class="label">
          Site Name
        </div>

        <input
          id="site"
          placeholder="Site Name"
        >

        <div class="label">
          Project Name
        </div>

        <input
          id="project"
          placeholder="Project Name"
        >

        <div class="label">
          Today's Progress
        </div>

        <textarea
          id="progress"
          rows="4"
          placeholder="Write today's work">
        </textarea>

        <div class="label">
          Expense Item
        </div>

        <input
          id="expenseItem"
          placeholder="Cement / Sand etc"
        >

        <div class="label">
          Expense Amount
        </div>

        <input
          type="number"
          id="expenseAmount"
          placeholder="Amount"
        >

        <div class="label">
          Upload Site Photos
        </div>

        <input
          type="file"
          multiple
          accept="image/*"
          onchange="handlePhotos(this)"
        >

        <div
          class="photos"
          id="preview">
        </div>

        <button
          class="btn"
          onclick="saveReport()">
          Save Report
        </button>

      </div>

      `

      :

      `

      <div class="card">

        <div
          style="
            font-size:22px;
            font-weight:bold;
          ">

          📊 Owner Dashboard

        </div>

        <div
          style="
            margin-top:10px;
            color:#8b949e;
            line-height:1.8;
          ">

          Total Reports:
          ${reports.length}

          <br>

          Total Projects:
          ${
            [...new Set(
              reports.map(
                r=>r.project_name
              )
            )].length
          }

        </div>

      </div>

      `
    }

    <div
      style="
        font-size:22px;
        font-weight:bold;
        margin-bottom:15px;
      ">

      📋 ${
        user.role === 'owner'
        ? 'All Project Reports'
        : 'My Reports'
      }

    </div>

    ${
      filteredReports.length === 0

      ?

      `
      <div class="card">
        No Reports Found
      </div>
      `

      :

      filteredReports.map(r=>`

      <div class="report">

        <div
          style="
            font-size:20px;
            font-weight:bold;
            color:#58a6ff;
          ">

          ${r.project_name}

        </div>

        <div
          style="
            margin-top:5px;
            color:#8b949e;
          ">

          🏗️ ${r.site_name}

        </div>

        <div
          style="
            margin-top:14px;
            line-height:1.7;
            color:#ddd;
          ">

          ${r.progress}

        </div>

        <div
          style="
            margin-top:12px;
            font-size:13px;
            color:#8b949e;
            line-height:1.8;
          ">

          📅 ${r.date}

          <br>

          👷 ${r.supervisor_name}

          <br>

          💰 ₹${
            r.expenses?.[0]?.amount || 0
          }

        </div>

        ${
          r.photos &&
          r.photos.length > 0

          ?

          `

          <div class="photos">

            ${r.photos.map(p=>`

              <img src="${p.url}">

            `).join('')}

          </div>

          `

          :

          ''
        }

      </div>

      `).join('')
    }

  </div>
  `;
}

/* =========================
   ERROR
========================= */

window.onerror = function(
  msg,
  src,
  line
){

  toast(
    'Error: ' + msg,
    '#e94560'
  );

  console.log(
    msg,
    src,
    line
  );
};

/* =========================
   START
========================= */

if(user){
  dashboard();
}else{
  loginPage();
}

</script>

</body>
</html>
