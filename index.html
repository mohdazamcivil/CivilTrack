<head>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}
body{background:#0d1117;color:#fff}.container{max-width:1100px;margin:auto;padding:18px}
.card,.report{background:#161b22;border:1px solid #30363d;border-radius:14px;padding:18px;margin-bottom:16px}
.report{background:#0d1117}.title{font-size:24px;font-weight:800}.topbar{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:18px}
input,select,textarea{width:100%;padding:12px;border-radius:10px;border:1px solid #30363d;background:#0d1117;color:#fff;margin-top:5px}
.label{font-size:13px;color:#8b949e;margin-top:12px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
button{border:0;border-radius:10px;padding:11px 15px;font-weight:700;cursor:pointer}.btn{width:100%;background:#238636;color:white;margin-top:18px}.small{padding:8px 12px;font-size:13px}
.red{background:#e94560;color:#fff}.blue{background:#58a6ff;color:#fff}.gold{background:#e3b341;color:#000}.tab{background:#161b22;color:#fff;border:1px solid #30363d}.active{background:#238636}
.tabs{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}.photos{display:flex;gap:9px;flex-wrap:wrap;margin-top:10px}.photos img{width:88px;height:88px;object-fit:cover;border-radius:10px;border:1px solid #30363d}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:12px 20px;border-radius:25px;z-index:9999;font-weight:700}
.badge{padding:4px 10px;border-radius:20px;font-size:12px}.ok{background:#0f3b1a;color:#3fb950}.pend{background:#3b2600;color:#e3b341}
.footer{text-align:center;color:#8b949e;border-top:1px solid #30363d;padding:18px;margin-top:25px}
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:99999;align-items:center;justify-content:center;padding:20px}#modal img{max-width:95%;max-height:95%;border-radius:14px}
@media(max-width:700px){.grid2,.grid3{grid-template-columns:1fr}}
</style>
</head>

function toast(m,c='#238636'){document.querySelectorAll('.toast').forEach(x=>x.remove());let t=document.createElement('div');t.className='toast';t.style.background=c;t.innerText=m;document.body.appendChild(t);setTimeout(()=>t.remove(),2500)}
function opts(a,v=''){return '<option value="">Select</option>'+a.map(x=>`<option ${x==v?'selected':''}>${x}</option>`).join('')+'<option value="__custom__">Other / Add Manually</option>'}

function blockOpts(s,d){return '<option value="">Select Block</option>'+((BLOCKS[s+'|'+d]||[]).map(b=>`<option>${b}</option>`).join(''))+'<option value="__custom__">Other / Add Manually</option>'}

function loginPage(){
app.innerHTML=`<div class="container"><div class="card" style="max-width:420px;margin:80px auto">
<div class="title" style="text-align:center">🏗️ CivilTrack Pro</div>
<div class="label">Username</div><input id="u">
<div class="label">Password</div><input id="p" type="password" onkeydown="if(event.key==='Enter')login()">

<div class="footer">© Copyright Reserved | Made by <b>MOHD AZAM</b></div></div></div>`;

function login(){let m=USERS[u.value.trim()];if(m&&m.pass===p.value.trim()){user={...m,username:u.value.trim()};localStorage.setItem('civil_user',JSON.stringify(user));render();loadAll();live()}else toast('Invalid Login','#e94560')}

async function loadAll(){
 let [r,m,f]=await Promise.all([
  db.from('reports').select('*').order('date',{ascending:false}).limit(200),
  db.from('material_reports').select('*').order('date',{ascending:false}).limit(300),
  db.from('future_funds').select('*').order('release_date',{ascending:true}).limit(300)
 ]);
 if(!r.error)reports=r.data||[]; if(!m.error)materials=m.data||[]; if(!f.error)funds=f.data||[];
 render();
}
function live(){
 if(ch1)return;
 ch1=db.channel('r').on('postgres_changes',{event:'*',schema:'public',table:'reports'},loadAll).subscribe();
 ch2=db.channel('m').on('postgres_changes',{event:'*',schema:'public',table:'material_reports'},loadAll).subscribe();
 ch3=db.channel('f').on('postgres_changes',{event:'*',schema:'public',table:'future_funds'},loadAll).subscribe();
}

async function compress(file){return new Promise(res=>{let r=new FileReader();r.onload=e=>{let i=new Image();i.onload=()=>{let c=document.createElement('canvas'),w=i.width,h=i.height,ms=700;if(w>h&&w>ms){h=h*ms/w;w=ms}else if(h>ms){w=w*ms/h;h=ms}c.width=w;c.height=h;c.getContext('2d').drawImage(i,0,0,w,h);res({name:file.name,url:c.toDataURL('image/jpeg',.55)})};i.src=e.target.result};r.readAsDataURL(file)})}
async function handlePhotos(inp,type){let imgs=await Promise.all([...inp.files].slice(0,4).map(compress));if(type==='mat'){mphotos=[...mphotos,...imgs].slice(0,6);matPreview.innerHTML=mphotos.map(x=>`<img src="${x.url}" onclick="showImg('${x.url}')">`).join('')}else{photos=[...photos,...imgs].slice(0,6);preview.innerHTML=photos.map(x=>`<img src="${x.url}" onclick="showImg('${x.url}')">`).join('')}}

function loc(prefix=''){
 let s=document.getElementById(prefix+'state'),d=document.getElementById(prefix+'district'),b=document.getElementById(prefix+'block');
 return `
 <div class="grid3">
 <div><div class="label">State</div><select id="${prefix}state" onchange="${prefix?'setMDist':'setDist'}('${prefix}')">${stateOpts()}</select></div>
 <div><div class="label">District</div><select id="${prefix}district" onchange="${prefix?'setMBlock':'setBlock'}('${prefix}')"><option>Select State First</option></select></div>
 <div><div class="label">Block / Place</div><select id="${prefix}block" onchange="toggleCustom('${prefix}')"><option>Select District First</option></select></div>
 <div id="${prefix}customBox" style="display:none"><div class="label">Custom Block/Place</div><input id="${prefix}custom"></div>
 </div>`;
}
function setDist(pre=''){document.getElementById(pre+'district').innerHTML=districtOpts(document.getElementById(pre+'state').value);document.getElementById(pre+'block').innerHTML='<option>Select District First</option>'}
function setBlock(pre=''){let s=document.getElementById(pre+'state').value,d=document.getElementById(pre+'district').value;document.getElementById(pre+'block').innerHTML=blockOpts(s,d)}
function setMDist(p){setDist(p)} function setMBlock(p){setBlock(p)}
function toggleCustom(p=''){document.getElementById(p+'customBox').style.display=document.getElementById(p+'block').value==='__custom__'?'block':'none'}
function getBlock(p=''){let v=document.getElementById(p+'block').value;return v==='__custom__'?document.getElementById(p+'custom').value.trim():v}

async function saveProgress(){
 let pay={date:date.value,state:state.value,district:district.value,block:getBlock(),site_name:site.value,project_name:project.value,supervisor_name:user.name,progress:progress.value,expenses:[{item:expenseItem.value,amount:expenseAmount.value}],photos};
 if(!pay.site_name||!pay.project_name||!pay.progress)return toast('Required fields fill karo','#e3b341');
 let {data,error}=await db.from('reports').insert([pay]).select().single();
 if(error)return toast('Save failed','#e94560'); photos=[]; reports=[data,...reports]; toast('Progress Saved'); render();
}
async function saveMaterial(){
 let pay={date:mdate.value,state:mstate.value,district:mdistrict.value,block:getBlock('m'),site_name:msite.value,project_name:mproject.value,supervisor_name:user.name,
 stock_items:[['Sand',sandQty.value],['Aggregate',aggregateQty.value],['Cement Bags',cementQty.value],['Steel',steelQty.value],['Bricks',brickQty.value],['Custom',customQty.value]].map(x=>({name:x[0],qty:x[1]})),
 requirements:[{item:requiredItem.value,qty:requiredQty.value}],stock_days:stockDays.value,remarks:mremarks.value,photos:mphotos,engineer_fulfilled:false,owner_fulfilled:false};
 if(!pay.site_name||!pay.project_name)return toast('Site & Project required','#e3b341');
 let {data,error}=await db.from('material_reports').insert([pay]).select().single();
 if(error)return toast('Material save failed','#e94560'); mphotos=[]; materials=[data,...materials]; toast('Material Saved'); render();
}
async function fulfil(id,type){let r=materials.find(x=>x.id===id),o={fulfilled_at:new Date().toISOString()};o[type+'_fulfilled']=!r[type+'_fulfilled'];let {error}=await db.from('material_reports').update(o).eq('id',id);if(error)return toast('Update failed','#e94560');Object.assign(r,o);render()}

function calculateTender(){
 let amt=+tenderAmount.value||0,typ=rateType.value,per=+ratePercent.value||0,q=typ==='below'?amt-amt*per/100:amt+amt*per/100;
 let d=(+sdpg.value||0)+(+gst.value||0)+(+royalty.value||0)+(+labourCess.value||0)+(+otherDeduction.value||0);
 let ded=q*d/100,net=q-ded;
 tenderResult.innerHTML=`Tender: <b>${money(amt)}</b><br>Quoted: <b>${money(q)}</b><br>Total Deduction: <b>${money(ded)}</b><br><span style="font-size:24px;color:#3fb950">Net: <b>${money(net)}</b></span>`;
}
async function addFutureFund(){
 let rel=addYears(agreementDate.value,+releaseYears.value||3);
 let pay={department:fundDepartment.value,project_name:fundProject.value,agreement_date:agreementDate.value,sdpg_amount:+fundAmount.value||0,release_years:+releaseYears.value||3,release_date:rel,note:fundNote.value};
 if(!pay.department||!pay.agreement_date||!pay.sdpg_amount)return toast('Future fund fields fill karo','#e3b341');
 let {data,error}=await db.from('future_funds').insert([pay]).select().single(); if(error)return toast('Reminder failed','#e94560');
 funds=[...funds,data].sort((a,b)=>new Date(a.release_date)-new Date(b.release_date)); toast('Reminder saved'); render(); setTimeout(()=>openCal(data),400);
}
function addYears(ds,y){let d=new Date(ds);d.setFullYear(d.getFullYear()+y);return d.toISOString().split('T')[0]}
function openCal(f){let t=encodeURIComponent('SD/PG Release - '+f.department),de=encodeURIComponent(`Project: ${f.project_name}\nAmount: ${money(f.sdpg_amount)}\nRelease: ${f.release_date}`),dt=f.release_date.replaceAll('-','');window.open(`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${t}&dates=${dt}/${dt}&details=${de}`,'_blank')}
async function delFund(id){await db.from('future_funds').delete().eq('id',id);funds=funds.filter(x=>x.id!==id);render()}
function daysLeft(d){return Math.ceil((new Date(d)-new Date(today()))/86400000)}

function filtered(list){return list.filter(r=>(!ownerState||r.state===ownerState)&&(!ownerDistrict||r.district===ownerDistrict)&&(!ownerBlock||r.block===ownerBlock))}
function ownerFilter(){
 let blocks=[...new Set([...reports,...materials].filter(r=>(!ownerState||r.state===ownerState)&&(!ownerDistrict||r.district===ownerDistrict)&&r.block).map(r=>r.block))];
 return `<div class="card"><div class="grid3">
 <div><div class="label">State</div><select onchange="ownerState=this.value;ownerDistrict='';ownerBlock='';render()"><option value="">All</option>${Object.keys(STATES).map(s=>`<option ${ownerState===s?'selected':''}>${s}</option>`).join('')}</select></div>
 <div><div class="label">District</div><select onchange="ownerDistrict=this.value;ownerBlock='';render()"><option value="">All</option>${(STATES[ownerState]||[]).map(d=>`<option ${ownerDistrict===d?'selected':''}>${d}</option>`).join('')}</select></div>
 <div><div class="label">Block</div><select onchange="ownerBlock=this.value;render()"><option value="">All</option>${blocks.map(b=>`<option ${ownerBlock===b?'selected':''}>${b}</option>`).join('')}</select></div>
 </div></div>`
}
function reportList(a){return a.length?a.map(r=>`<div class="report"><b style="color:#58a6ff">${r.project_name||''}</b><br>🏗️ ${r.site_name||''}<br>📍 ${r.state||''}/${r.district||''}/${r.block||''}<p style="margin-top:10px">${r.progress||''}</p><small>📅 ${r.date} | 👷 ${r.supervisor_name}</small>${r.photos?.length?`<div class="photos">${r.photos.map(p=>`<img src="${p.url}" onclick="showImg('${p.url}')">`).join('')}</div>`:''}</div>`).join(''):'<div style="color:#8b949e">No Reports</div>'}
function matList(a){return a.length?a.map(r=>`<div class="report"><div style="display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap"><div><b style="color:#58a6ff">${r.project_name}</b><br>🏗️ ${r.site_name}<br>📍 ${r.state}/${r.district}/${r.block}</div><span class="badge ${(r.owner_fulfilled||r.engineer_fulfilled)?'ok':'pend'}">${(r.owner_fulfilled||r.engineer_fulfilled)?'FULFILLED':'PENDING'}</span></div><hr style="border-color:#30363d;margin:10px 0"><b>📦 Stock</b><br>${(r.stock_items||[]).map(x=>`${x.name}: ${x.qty||'-'}`).join('<br>')}<br><br><b>🛒 Requirement</b><br>${(r.requirements||[]).map(x=>`${x.item}: ${x.qty}`).join('<br>')}<br>⏳ Stock Days: ${r.stock_days||'-'}<br>${r.remarks||''}${r.photos?.length?`<div class="photos">${r.photos.map(p=>`<img src="${p.url}" onclick="showImg('${p.url}')">`).join('')}</div>`:''}<div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap"><button class="small blue" onclick="fulfil('${r.id}','owner')">Owner Fulfilled</button><button class="small" onclick="fulfil('${r.id}','engineer')">Engineer Fulfilled</button></div></div>`).join(''):'<div style="color:#8b949e">No Material Reports</div>'}
function materialPDF(){let w=window.open('');w.document.write(`<h1>Material Report</h1><table border="1" cellpadding="8" cellspacing="0" width="100%"><tr><th>Date</th><th>Site</th><th>Project</th><th>Requirement</th><th>Status</th></tr>${materials.map(r=>`<tr><td>${r.date}</td><td>${r.site_name}</td><td>${r.project_name}</td><td>${(r.requirements||[]).map(x=>x.item+' '+x.qty).join(', ')}</td><td>${(r.owner_fulfilled||r.engineer_fulfilled)?'Fulfilled':'Pending'}</td></tr>`).join('')}</table><script>print()<\/script>`)}

function renderTender(){return `<div class="card"><div class="title">📑 Tender Analysis Calculator</div><div class="grid2"><div><div class="label">Tender Amount</div><input id="tenderAmount" type="number" oninput="calculateTender()"></div><div><div class="label">Above/Below</div><select id="rateType" onchange="calculateTender()"><option value="below">Below</option><option value="above">Above</option></select></div><div><div class="label">Percent</div><input id="ratePercent" value="0" type="number" oninput="calculateTender()"></div><div><div class="label">SD/PG %</div><input id="sdpg" value="0" type="number" oninput="calculateTender()"></div><div><div class="label">GST %</div><input id="gst" value="0" type="number" oninput="calculateTender()"></div><div><div class="label">Royalty %</div><input id="royalty" value="0" type="number" oninput="calculateTender()"></div><div><div class="label">Labour Cess %</div><input id="labourCess" value="0" type="number" oninput="calculateTender()"></div><div><div class="label">Other %</div><input id="otherDeduction" value="0" type="number" oninput="calculateTender()"></div></div><div id="tenderResult" class="resultBox">Calculation yahan show hoga.</div></div>`}
function renderFunds(){let total=funds.reduce((s,f)=>s+(+f.sdpg_amount||0),0);return `<div class="card"><div class="title">💰 Future Funds</div><div class="grid2"><div><div class="label">Department</div><input id="fundDepartment"></div><div><div class="label">Project</div><input id="fundProject"></div><div><div class="label">Agreement Date</div><input id="agreementDate" type="date" value="${today()}"></div><div><div class="label">SD/PG Amount</div><input id="fundAmount" type="number"></div><div><div class="label">Release Years</div><select id="releaseYears"><option>1</option><option>2</option><option selected>3</option><option>4</option><option>5</option></select></div><div><div class="label">Note</div><input id="fundNote"></div></div><button class="btn" onclick="addFutureFund()">Add Reminder + Google Calendar</button><div class="resultBox"><b>Total:</b> ${money(total)}</div></div><div class="card"><div class="title">📒 My All Funds Reminder</div>${funds.length?funds.map(f=>`<div class="report"><b>${f.department}</b> - ${f.project_name||''}<br>Agreement: ${f.agreement_date}<br>Release: <b style="color:#e3b341">${f.release_date}</b><br>Amount: <b style="color:#3fb950">${money(f.sdpg_amount)}</b><br>Days Left: ${daysLeft(f.release_date)}<br><button class="small" onclick='openCal(${JSON.stringify(f)})'>Google Calendar</button> <button class="small red" onclick="delFund('${f.id}')">Delete</button></div>`).join(''):'<p style="color:#8b949e">No reminders</p>'}</div>`}

function render(){
 if(!user)return loginPage();
 let myR=user.role==='owner'?reports:reports.filter(x=>x.supervisor_name===user.name);
 let myM=user.role==='owner'?materials:materials.filter(x=>x.supervisor_name===user.name);
 app.innerHTML=`<div class="container"><div class="topbar"><div class="title">🏗️ CivilTrack Pro</div><div>${user.role==='owner'?'👑 Owner':'👷 Engineer'} : ${user.name} <button class="red" onclick="logout()">Logout</button></div></div>
 ${user.role!=='owner'?`
 <div class="tabs"><button class="tab ${engTab==='progress'?'active':''}" onclick="engTab='progress';render()">📈 Site Progress</button><button class="tab ${engTab==='mat'?'active':''}" onclick="engTab='mat';render()">📦 Material Requirement</button></div>
 ${engTab==='progress'?`<div class="card"><div class="title">➕ Add Site Progress</div><div class="label">Date</div><input id="date" type="date" value="${today()}">${loc('')}<div class="label">Site</div><input id="site"><div class="label">Project</div><input id="project"><div class="label">Progress</div><textarea id="progress"></textarea><div class="grid2"><div><div class="label">Expense Item</div><input id="expenseItem"></div><div><div class="label">Amount</div><input id="expenseAmount" type="number"></div></div><div class="label">Photos</div><input type="file" multiple accept="image/*" onchange="handlePhotos(this,'progress')"><div class="photos" id="preview"></div><button class="btn" onclick="saveProgress()">Save Progress</button></div><div class="card"><div class="title">My Progress</div>${reportList(myR)}</div>`:
