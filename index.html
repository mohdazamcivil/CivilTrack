/* ── APP STATE ── */

/* ── FORM DEFAULT ── */
function blankForm() {
  return {
    date: toDay(),
    site_name: '',
    project_name: '',
    supervisor_name: user?.name || '',
    progress: '',
    instructions: '',
    remarks: '',
    expenses: [{ item: '', amount: '' }],
    photos: []
  };
}

/* ── HELPERS ── */
function toDay() {
  return new Date().toISOString().split('T')[0];
}

function fmtMoney(v) {
  return '₹' + Math.round(v).toLocaleString('en-IN');
}

function totalExp(arr) {
  return (arr || []).reduce(
    (s, e) => s + (parseFloat(e.amount) || 0),
    0
  );
}

function selReport() {
  return reports.find(r => r.id === selId);
}

/* ── TOAST ── */
let toastTimer;

function toast(msg, bg = '#238636') {

  document.querySelectorAll('.toast')
    .forEach(e => e.remove());

  const t = document.createElement('div');

  t.className = 'toast';

  t.style.background = bg;

  t.style.color = '#fff';

  t.textContent = msg;

  document.body.appendChild(t);

  clearTimeout(toastTimer);

  toastTimer = setTimeout(() => {
    t.remove();
  }, 3000);
}

/* ── LOAD REPORTS ── */
async function loadReports() {

  if (!db) {
    toast('❌ Supabase not configured', '#e94560');
    return;
  }

  toast('⏳ Loading...', '#58a6ff');

  const { data, error } = await db
    .from('reports')
    .select('*')
    .order('created_at', {
      ascending: false
    });

  if (error) {
    toast('❌ Load failed: ' + error.message, '#e94560');
    return;
  }

  reports = data || [];

  document.querySelectorAll('.toast')
    .forEach(e => e.remove());

  render();
}

/* ── SAVE REPORT ── */
async function saveReport() {

  if (!db) {
    toast('❌ Supabase not configured', '#e94560');
    return;
  }

  if (
    !form.site_name ||
    !form.project_name ||
    !form.progress
  ) {
    toast(
      '⚠️ Site, Project aur Progress zaroori hai!',
      '#e3b341'
    );
    return;
  }

  toast('⏳ Saving...', '#58a6ff');

  const payload = {
    date: form.date,
    site_name: form.site_name,
    project_name: form.project_name,
    supervisor_name: form.supervisor_name,
    progress: form.progress,
    instructions: form.instructions,
    remarks: form.remarks,
    expenses: form.expenses.filter(e => e.item),
    photos: form.photos
  };

  const { error } = await db
    .from('reports')
    .insert([payload]);

  if (error) {
    toast('❌ Error: ' + error.message, '#e94560');
    return;
  }

  toast('✅ Report submit ho gayi!');

  form = blankForm();

  await loadReports();

  view = user.role === 'owner'
    ? 'dashboard'
    : 'myReports';

  render();
}

/* ── FIXED TENDER TEXT ── */
function tenderText(dir, pct) {

  return dir === 'below'
    ? pct + '% below tender'
    : pct + '% above tender';
}

/* ── LOGOUT ── */
window.doLogout = function () {

  user = null;

  localStorage.removeItem('ct_user');

  view = 'login';

  render();
};

/* ── OPEN DETAIL ── */
window.openDetail = function (id) {

  selId = id;

  view = 'detail';

  renderView();
};

/* ── BOOT ── */
if (user) {
  loadReports();
} else {
  render();
}
</script>
